// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

function getComboScore(base) {
  const mult = [100, 150, 200, 300, 500];
  const idx = Math.min(comboCounter - 1, 4);
  return base === 100 ? mult[idx] : base;
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60, vy: -2 });
}

function updateFloatingTexts() {
  floatingTexts = floatingTexts.filter(ft => {
    ft.y += ft.vy;
    ft.life--;
    return ft.life > 0;
  });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }
}

// ==================== PARALLAX SCROLLING ====================
function generateParallaxElements(type) {
  const elements = [];
  if (type === 0) {
    for (let i = 0; i < 8; i++) {
      elements.push({ x: i * 200, h: 120 + Math.sin(i * 1.3) * 60, w: 160 });
    }
  } else if (type === 1) {
    for (let i = 0; i < 12; i++) {
      elements.push({ x: i * 140, h: 80 + Math.sin(i * 2.1) * 30 });
    }
  } else {
    for (let i = 0; i < 20; i++) {
      elements.push({ x: i * 90, h: 15 + Math.sin(i * 1.7) * 8 });
    }
  }
  return elements;
}

function drawPixelArt(ctx, x, y, pixelData, scale) {
  const rows = pixelData.length;
  const cols = pixelData[0].length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = pixelData[r][c];
      if (ch === '_') continue;
      const color = PIXEL_COLORS[ch];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
}

// ==================== SOUND MANAGER (Web Audio API) ====================
class SoundManager {
  constructor() {
    this.audioCtx = null;
    this.muted = false;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch (e) {
      console.warn('Web Audio API not supported');
    }
  }

  toggle() {
    this.muted = !this.muted;
    gameMuted = this.muted;
  }

  playTone(frequency, duration, type, freqEnd, volume) {
    if (this.muted || !this.initialized) return;
    const osc = this.audioCtx.createOscillator();
    const gain = this.audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(frequency, this.audioCtx.currentTime);
    if (freqEnd) {
      osc.frequency.linearRampToValueAtTime(freqEnd, this.audioCtx.currentTime + duration);
    }
    gain.gain.setValueAtTime(volume || 0.15, this.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.audioCtx.destination);
    osc.start(this.audioCtx.currentTime);
    osc.stop(this.audioCtx.currentTime + duration);
  }

  jump() {
    this.playTone(200, 0.15, 'square', 600, 0.12);
  }

  collect() {
    this.playTone(500, 0.08, 'sine', 1200, 0.15);
    setTimeout(() => this.playTone(800, 0.1, 'sine', 1600, 0.12), 80);
  }

  hurt() {
    this.playTone(400, 0.2, 'square', 100, 0.15);
  }

  killEnemy() {
    this.playTone(300, 0.1, 'square', 800, 0.15);
    setTimeout(() => this.playTone(600, 0.1, 'square', 1200, 0.1), 100);
  }

  bossHurt() {
    this.playTone(200, 0.15, 'sawtooth', 500, 0.18);
  }

  checkpoint() {
    this.playTone(400, 0.1, 'sine', 800, 0.15);
    setTimeout(() => this.playTone(600, 0.15, 'sine', 1000, 0.12), 100);
    setTimeout(() => this.playTone(800, 0.2, 'sine', 1200, 0.1), 200);
  }

  victory() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => this.playTone(freq, 0.3, 'square', freq, 0.15), i * 150);
    });
  }

  bossDefeat() {
    for (let i = 0; i < 6; i++) {
      setTimeout(() => this.playTone(200 + i * 100, 0.2, 'sawtooth', 100 + i * 50, 0.2), i * 80);
    }
  }
}

// ==================== MUSIC MANAGER (Web Audio API) ====================
class MusicManager {
  constructor() {
    this.audioCtx = null;
    this.isPlaying = false;
    this.currentLoop = null;
    this.masterGain = null;
  }

  init() {
    if (this.audioCtx) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.audioCtx.createGain();
      this.masterGain.gain.value = 0.12;
      this.masterGain.connect(this.audioCtx.destination);
    } catch (e) {
      console.warn('Web Audio API not supported for music');
    }
  }

  playNote(freq, duration, startTime, type) {
    if (!this.audioCtx || gameMuted) return;
    const osc = this.audioCtx.createOscillator();
    const gain = this.audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.08, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  playBassNote(freq, duration, startTime) {
    if (!this.audioCtx || gameMuted) return;
    const osc = this.audioCtx.createOscillator();
    const gain = this.audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.1, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

    const playLoop = () => {
      if (!this.isPlaying) return;
      let time = this.audioCtx.currentTime + 0.05;
      for (const n of melody) {
        if (n.note > 0) this.playNote(n.note, n.dur * 0.9, time, 'square');

    const playLoop = () => {
      if (!this.isPlaying) return;
      let time = this.audioCtx.currentTime + 0.05;
      for (const n of melody) {
        this.playNote(n.note, n.dur * 0.85, time, 'square');
        time += n.dur;
      }
      let bassTime = this.audioCtx.currentTime + 0.05;
      for (const b of bassLine) {
        this.playBassNote(b.note, b.dur * 0.7, bassTime);
        bassTime += b.dur;
      }
      const loopLen = melody.reduce((s, n) => s + n.dur, 0);
      this.currentLoop = setTimeout(playLoop, loopLen * 1000);
    };
    playLoop();
  }

  stop() {
    this.isPlaying = false;
    if (this.currentLoop) {
      clearTimeout(this.currentLoop);
      this.currentLoop = null;
    }
  }
}

// ==================== PARTICLE SYSTEM ====================
class Particle {
  constructor(x, y, color, vx, vy, size, life) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = vx;
    this.vy = vy;
    this.size = size;
    this.life = life;
    this.maxLife = life;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.life--;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
  }

  emit(x, y, count, colors, opts) {
    const speed = (opts && opts.speed) || 4;
    const size = (opts && opts.size) || 4;
    const life = (opts && opts.life) || 30;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      const color = colors[Math.floor(Math.random() * colors.length)];
      this.particles.push(new Particle(
        x, y, color,
        Math.cos(angle) * spd,
        Math.sin(angle) * spd - 2,
        size + Math.random() * 2,
        life + Math.random() * 15
      ));
    }
  }

  emitExplosion(x, y) {
    this.emit(x, y, 30, ['#ff0000', '#ff4444', '#ff8800', '#ffcc00', '#ffffff'], { speed: 6, size: 5, life: 40 });
  }

  emitCollect(x, y) {
    this.emit(x, y, 20, ['#ffd700', '#ffee44', '#ffffff', '#ffaa00'], { speed: 3, size: 3, life: 25 });
  }

  emitBossHit(x, y) {
    this.emit(x, y, 25, ['#9933ff', '#bb55ff', '#7700cc', '#ffffff', '#ff44ff'], { speed: 5, size: 4, life: 35 });
  }

  emitVictory(x, y) {
    this.emit(x, y, 50, ['#ffd700', '#ff0000', '#00ff00', '#00ccff', '#ff00ff', '#ffffff'], { speed: 8, size: 5, life: 60 });
  }

  update() {
    this.particles = this.particles.filter(p => {
      p.update();
      return p.life > 0;
    });
  }

  draw(ctx) {
    this.particles.forEach(p => p.draw(ctx));
  }
}

const particleSystem = new ParticleSystem();

// ==================== SCREEN SHAKE ====================
class ScreenShake {
  constructor() {
    this.intensity = 0;
    this.duration = 0;
    this.timer = 0;
    this.offsetX = 0;
    this.offsetY = 0;
  }

  shake(intensity, duration) {
    this.intensity = Math.max(this.intensity, intensity);
    this.duration = Math.max(this.duration, duration);
    this.timer = this.duration;
  }

  update() {
    if (this.timer > 0) {
      this.timer--;
      const progress = this.timer / this.duration;
      const currentIntensity = this.intensity * progress;
      this.offsetX = (Math.random() - 0.5) * currentIntensity * 2;
      this.offsetY = (Math.random() - 0.5) * currentIntensity * 2;
    } else {
      this.offsetX = 0;
      this.offsetY = 0;
      this.intensity = 0;
    }
  }

  apply(ctx) {
    if (this.timer > 0) {
      ctx.save();
      ctx.translate(this.offsetX, this.offsetY);
    }
  }

  restore(ctx) {
    if (this.timer > 0) {
      ctx.restore();
    }
  }
}

const screenShake = new ScreenShake();

// ==================== BOSS PROJECTILES ====================
let bossProjectiles = [];

function updateBossProjectiles() {
  bossProjectiles = bossProjectiles.filter(p => {
    if (p.homing) {
      const dx = player.x + player.w / 2 - p.x;
      const dy = player.y + player.h / 2 - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      p.vx += (dx / dist) * 0.21;
      p.vy += (dy / dist) * 0.21;
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 3.5) {
        p.vx = (p.vx / speed) * 3.5;
        p.vy = (p.vy / speed) * 3.5;
      }
    }
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0 && p.x > 0 && p.x < W && p.y > 0 && p.y < H;
  });
}

function drawBossProjectiles() {
  for (const p of bossProjectiles) {
    if (p.homing) {
      const pGrad = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, 12);
      pGrad.addColorStop(0, '#ffaa00');
      pGrad.addColorStop(0.5, '#ff4400');
      pGrad.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = pGrad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(p.x - 5, p.y - 5, 10, 10);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    } else {
      const pGrad = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, 8);
      pGrad.addColorStop(0, '#ff88ff');
      pGrad.addColorStop(0.5, '#ff00ff');
      pGrad.addColorStop(1, 'rgba(200,0,200,0)');
      ctx.fillStyle = pGrad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff00ff';
      ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
      ctx.fillStyle = '#ff88ff';
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
  }
}

// ==================== MOVING PLATFORMS ====================
function updateMovingPlatforms() {
  const lv = LEVELS[currentLevel];
  if (!lv.movingPlatforms) return;

  for (const mp of lv.movingPlatforms) {
    const prevX = mp.x;
    const prevY = mp.y;

    if (mp.type === 'horizontal') {
      mp.x += mp.speed;
      if (mp.x >= mp.endX || mp.x <= mp.startX) mp.speed *= -1;
    } else if (mp.type === 'vertical') {
      mp.y += mp.speed;
      if (mp.y >= mp.endY || mp.y <= mp.startY) mp.speed *= -1;
    }

    mp.deltaX = mp.x - prevX;
    mp.deltaY = mp.y - prevY;
  }
}

function drawMovingPlatforms() {
  const lv = LEVELS[currentLevel];
  if (!lv.movingPlatforms) return;

  for (const mp of lv.movingPlatforms) {
    const mpGrad = ctx.createLinearGradient(mp.x, mp.y, mp.x, mp.y + mp.h);
    mpGrad.addColorStop(0, '#6abbeb');
    mpGrad.addColorStop(1, '#3a8acb');
    ctx.fillStyle = mpGrad;
    ctx.beginPath();
    ctx.roundRect(mp.x, mp.y, mp.w, mp.h, 3);
    ctx.fill();
    ctx.fillStyle = 'rgba(150,220,255,0.5)';
    ctx.beginPath();
    ctx.roundRect(mp.x, mp.y, mp.w, 4, 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    const arrowX = mp.x + mp.w / 2;
    const arrowY = mp.y + mp.h / 2;
    if (mp.type === 'horizontal') {
      ctx.beginPath();
      ctx.moveTo(arrowX - 6, arrowY);
      ctx.lineTo(arrowX, arrowY - 3);
      ctx.lineTo(arrowX, arrowY + 3);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(arrowX + 6, arrowY);
      ctx.lineTo(arrowX, arrowY - 3);
      ctx.lineTo(arrowX, arrowY + 3);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY - 6);
      ctx.lineTo(arrowX - 3, arrowY);
      ctx.lineTo(arrowX + 3, arrowY);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY + 6);
      ctx.lineTo(arrowX - 3, arrowY);
      ctx.lineTo(arrowX + 3, arrowY);
      ctx.fill();
    }
  }
}

// ==================== TRAPS ====================
function updateTraps() {
  const lv = LEVELS[currentLevel];
  if (!lv.traps) return;

  for (const trap of lv.traps) {
    if (trap.type === 'spike') {
      if (aabb(player, trap) && invincibleTimer <= 0) {
        takeDamage(DAMAGE_PER_HIT);
        invincibleTimer = 90;
        player.vy = -8;
        sound.hurt();
        screenShake.shake(5, 10);
        if (player.hp <= 0) {
          lives--;
          if (lives <= 0) gameState = 'gameover';
          else {
            resetPlayer();
            buildLevel(currentLevel);
          }
        }
        updateUI();
      }
    } else if (trap.type === 'crumble') {
      if (!trap.active && aabb(player, trap) && player.vy >= 0 && player.y + player.h <= trap.y + 10) {
        trap.active = true;
        trap.timer = 30;
      }
      if (trap.active) {
        trap.timer--;
        if (trap.timer <= 0) {
          trap.y = 1000;
        }
      }
    }
  }
}

function drawTraps() {
  const lv = LEVELS[currentLevel];
  if (!lv.traps) return;

  for (const trap of lv.traps) {
    if (trap.type === 'spike') {
      for (let i = 0; i < trap.w; i += 8) {
        const spikeGrad = ctx.createLinearGradient(trap.x + i, trap.y + trap.h, trap.x + i + 4, trap.y);
        spikeGrad.addColorStop(0, '#777');
        spikeGrad.addColorStop(0.5, '#aaa');
        spikeGrad.addColorStop(1, '#ddd');
        ctx.fillStyle = spikeGrad;
        ctx.beginPath();
        ctx.moveTo(trap.x + i, trap.y + trap.h);
        ctx.lineTo(trap.x + i + 4, trap.y);
        ctx.lineTo(trap.x + i + 8, trap.y + trap.h);
        ctx.fill();
      }
    } else if (trap.type === 'crumble') {
      if (trap.y > 500) continue;
      const alpha = trap.active ? trap.timer / 30 : 1;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#aa6633';
      ctx.fillRect(trap.x, trap.y, trap.w, trap.h);
      for (let dx = 0; dx < trap.w; dx += 8) {
        ctx.fillStyle = trap.active ? '#cc4422' : '#cc8844';
        ctx.fillRect(trap.x + dx, trap.y + 3, 3, trap.h - 3);
      }
      ctx.fillStyle = trap.active ? '#883311' : '#884422';
      ctx.fillRect(trap.x, trap.y + trap.h - 2, trap.w, 2);
      ctx.fillStyle = trap.active ? '#aa5522' : '#cc8844';
      ctx.fillRect(trap.x, trap.y, trap.w, 3);
      if (trap.active && trap.timer > 15) {
        ctx.fillStyle = `rgba(255,200,100,${(trap.timer - 15) / 15 * 0.3})`;
        ctx.fillRect(trap.x, trap.y, trap.w, trap.h);
      }
      ctx.globalAlpha = 1;
    }
  }
}

    buildLevel(currentLevel);
  } else {
    gameState = 'menu';
  }
}

function handleDeath() {
  lives--;
  if (lives > 0) {
    resetPlayer();
    buildLevel(currentLevel);
  } else {
    music.stop();
    gameState = 'gameover';
  }
  updateUI();
}

function updateUI() {
  let hpStr = '';
  for (let i = 0; i < player.maxHp; i++) {
    hpStr += i < player.hp ? '❤' : '🖤';
  }
  hpStr += '  ×' + lives;
  document.getElementById('hpDisplay').textContent = hpStr;
  document.getElementById('scoreDisplay').textContent = '⭐ ' + score;
  const lvNames = ['森林冒险','翻山越岭','蛇精洞府'];
  document.getElementById('levelDisplay').textContent = '第' + (currentLevel+1) + '关: ' + lvNames[currentLevel];
  const abEl = document.getElementById('abilityDisplay');
  if (player.ability) {
    const ab = CHARACTER_ABILITIES[currentChar];
    abEl.textContent = ab.name + '·' + ab.ability;
    abEl.style.color = GOURDS[currentChar].color;
  }
}

// ==================== COLLISION ====================
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function takeDamage(amount) {
  damageAccumulator += amount;
  if (damageAccumulator >= 1) {
    const hits = Math.floor(damageAccumulator);
    player.hp -= hits;
    damageAccumulator -= hits;
  }
}

function resolveCollision(entity, plat) {
  const overlapX = Math.min(entity.x + entity.w - plat.x, plat.x + plat.w - entity.x);
  const overlapY = Math.min(entity.y + entity.h - plat.y, plat.y + plat.h - entity.y);
  
  // 根据移动方向决定碰撞解析
  if (entity.vy > 0 && overlapY < overlapX) {
    // 正在下落，从上方碰撞
    entity.y = plat.y - entity.h;
    entity.vy = 0;
    entity.onGround = true;
  } else if (entity.vy < 0 && overlapY < overlapX) {
    // 正在上升，从下方碰撞
    entity.y = plat.y + plat.h;
    entity.vy = 0;
  } else if (overlapX < overlapY) {
    // 水平碰撞
    if (entity.x + entity.w / 2 < plat.x + plat.w / 2) {
      entity.x = plat.x - entity.w;
    } else {
      entity.x = plat.x + plat.w;
    }
    entity.vx = 0;
  } else {
    // 默认垂直解析
    if (entity.y + entity.h / 2 < plat.y + plat.h / 2) {
      entity.y = plat.y - entity.h;
      entity.vy = 0;
      entity.onGround = true;
    } else {
      entity.y = plat.y + plat.h;
      entity.vy = 0;
    }
  }
}

// ==================== UPDATE PLAYER ====================
function updatePlayer() {
  let dx = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) { dx = -1; player.facing = -1; }
  if (keys['KeyD'] || keys['ArrowRight']) { dx = 1; player.facing = 1; }
  // S键减速/蹲下
  const speedMult = keys['KeyS'] ? 0.4 : 1;
  const baseSpeed = player.ability === 'fastMove' ? 6.25 : 5;
  player.vx = dx * baseSpeed * FRICTION * speedMult;

  const jumpForce = player.ability === 'longJump' ? JUMP_FORCE * 1.3 : JUMP_FORCE;
  if ((keys['KeyG'] || keys['KeyW'] || keys['ArrowUp'] || keys['Space']) && (player.onGround || player.coyoteTimer > 0)) {
    player.vy = jumpForce;
    player.onGround = false;
    player.coyoteTimer = 0;
    sound.jump();
  }

  if (keys['KeyK'] && !player.specialCooldown) {
    if (player.ability === 'fireBreath') {
      fireBalls.push({
        x: player.x + player.w / 2,
        y: player.y + player.h / 2 - 4,
        vx: player.facing * 8,
        vy: 0,
        life: 40
      });
      player.specialCooldown = 20;
      sound.collect();
    } else if (player.ability === 'stealth') {
      stealthTimer = 120;
      player.specialCooldown = 90;
      sound.jump();
    } else {
      player.vx = player.facing * 12;
      player.specialCooldown = 30;
      sound.hurt();
    }
  }
  if (player.specialCooldown > 0) player.specialCooldown--;
  if (stealthTimer > 0) stealthTimer--;

  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  if (Math.abs(player.vx) > 0.5) {
    animTimer++;
    if (animTimer >= 8) {
      animTimer = 0;
      animFrame = (animFrame + 1) % ANIM_WALK.length;
    }
  } else {
    animFrame = 0;
    animTimer = 0;
  }

  const lv = LEVELS[currentLevel];
  player.onGround = false;

  for (const p of lv.platforms) {
    if (aabb(player, p)) {
      resolveCollision(player, p);
    }
  }

  for (const mp of lv.movingPlatforms || []) {
    if (aabb(player, mp) && player.vy >= 0) {
      if (player.y + player.h <= mp.y + 10) {
        player.x += mp.deltaX || 0;
        player.y = mp.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Coyote time
  if (player.onGround) {
    player.coyoteTimer = 10;
  } else {
    if (player.coyoteTimer > 0) player.coyoteTimer--;
  }

  // Checkpoint detection
  for (const cp of lv.checkpoints) {
    if (!cp.active && aabb(player, { x: cp.x, y: cp.y, w: 32, h: 40 })) {
      cp.active = true;
      lastCheckpoint = { x: cp.x, y: cp.y };
      sound.checkpoint();
      particleSystem.emitCollect(cp.x + 16, cp.y + 20);
    }
  }

  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > W) { player.x = W - player.w; player.vx = 0; }
  if (player.y > H) {
    if (lastCheckpoint) {
      player.x = lastCheckpoint.x;
      player.y = lastCheckpoint.y;
      player.vx = 0;
      player.vy = 0;
      invincibleTimer = 90;
      screenShake.shake(4, 8);
      sound.hurt();
    } else {
      player.hp = 0;
    }
  }
  if (player.y < 0) { player.y = 0; player.vy = 0; }

  if (invincibleTimer > 0) invincibleTimer--;

  // Boss projectiles hit player
  for (const bp of bossProjectiles) {
    if (aabb(player, { x: bp.x - 4, y: bp.y - 4, w: 8, h: 8 })) {
      if (invincibleTimer <= 0) {
        takeDamage(DAMAGE_PER_HIT);
        invincibleTimer = 90;
        player.vy = -6;
        bp.life = 0;
        sound.hurt();
        screenShake.shake(6, 10);
        if (player.hp <= 0) { handleDeath(); return; }
        updateUI();
      }
    }
  }

  // Enemy collision
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    if (!aabb(player, e)) continue;
    if (stealthTimer > 0) continue;

    const playerBottom = player.y + player.h;
    const enemyTop = e.y;
    const falling = player.vy > 0;

    if (falling && playerBottom - enemyTop < 20) {
      if (e.type === 'boss') {
        e.hp -= (player.ability === 'doubleDamage' ? 2 : 1);
        e.flashTimer = 10;
        e.shootTimer = 0;
        player.vy = JUMP_FORCE * 0.7;
        sound.bossHurt();
        screenShake.shake(10, 15);
        particleSystem.emitBossHit(e.x + e.w / 2, e.y + e.h / 2);
        if (e.hp <= 0) {
          e.alive = false;
          score += 500;
          particleSystem.emitVictory(e.x + e.w / 2, e.y + e.h / 2);
          screenShake.shake(15, 25);
          sound.bossDefeat();
          lv.bossDefeated = true;
        }
        score += 100;
      } else {
        e.alive = false;
        player.vy = JUMP_FORCE * 0.7;
        comboCounter++;
        comboTimer = COMBO_TIMEOUT;
        const pts = getComboScore(100);
        score += pts;
        sound.killEnemy();
        particleSystem.emitExplosion(e.x + e.w / 2, e.y + e.h / 2);
        screenShake.shake(3, 5);
        const textX = e.x + e.w / 2;
        const textY = e.y - 10;
        if (comboCounter >= 5) {
          addFloatingText(textX, textY, 'UNSTOPPABLE! + ' + pts, '#ff0');
        } else if (comboCounter >= 2) {
          addFloatingText(textX, textY, 'x' + comboCounter + ' COMBO! + ' + pts, '#ff0');
        } else {
          addFloatingText(textX, textY, '+' + pts, '#fff');
        }
      }
    } else if (invincibleTimer <= 0) {
      takeDamage(DAMAGE_PER_HIT);
      invincibleTimer = 90;
      player.vx = (player.x < e.x) ? -6 : 6;
      player.vy = -6;
      sound.hurt();
      screenShake.shake(5, 12);
      if (player.hp <= 0) { handleDeath(); return; }
    }
    updateUI();
  }

  // Fireball collision with enemies
  for (let fi = fireBalls.length - 1; fi >= 0; fi--) {
    const fb = fireBalls[fi];
    for (const e of lv.enemies) {
      if (!e.alive) continue;
      if (aabb({ x: fb.x - 4, y: fb.y - 4, w: 8, h: 8 }, e)) {
        if (e.type === 'boss') {
          e.hp--;
          e.flashTimer = 10;
          e.shootTimer = 0;
          sound.bossHurt();
          screenShake.shake(8, 12);
          particleSystem.emitBossHit(e.x + e.w / 2, e.y + e.h / 2);
          if (e.hp <= 0) {
            e.alive = false;
            score += 500;
            particleSystem.emitVictory(e.x + e.w / 2, e.y + e.h / 2);
            screenShake.shake(15, 25);
            sound.bossDefeat();
            lv.bossDefeated = true;
          }
        } else {
          e.alive = false;
          score += 100;
          sound.killEnemy();
          particleSystem.emitExplosion(e.x + e.w / 2, e.y + e.h / 2);
          screenShake.shake(3, 5);
        }
        fb.life = 0;
        break;
      }
    }
  }

  // Bottle collection
  const magnetRange = player.ability === 'magnet' ? 96 : 0;
  for (const b of lv.bottles) {
    if (b.collected) continue;
    if (magnetRange > 0) {
      const mdx = (player.x + player.w/2) - (b.x + b.w/2);
      const mdy = (player.y + player.h/2) - (b.y + b.h/2);
      const mDist = Math.sqrt(mdx*mdx + mdy*mdy);
      if (mDist < magnetRange) {
        b.x += mdx * 0.08;
        b.y += mdy * 0.08;
      }
    }
    if (aabb(player, b)) {
      b.collected = true;
      if (player.hp < player.maxHp) player.hp = Math.min(player.hp + 2, player.maxHp);
      score += 50;
      sound.collect();
      particleSystem.emitCollect(b.x + b.w / 2, b.y + b.h / 2);
      updateUI();
    }
  }

  // General death check (falling off screen)
  if (player.hp <= 0 && gameState === 'playing') {
    handleDeath();
    return;
  }

  // Exit check (only if boss defeated in level 2)
  if (lv.exit && aabb(player, lv.exit)) {
    if (currentLevel === 2 && !lv.bossDefeated) {
      // Cannot exit until boss is defeated
    } else if (currentLevel < 2) {
      currentLevel++;
      if (lives < 5) lives++;
      buildLevel(currentLevel);
      resetPlayer();
      music.playLevelMusic(currentLevel);
      updateUI();
    } else if (currentLevel === 2 && lv.bossDefeated) {
      sound.victory();
      music.stop();
      gameState = 'victory';
    }
  }
}

// ==================== UPDATE ENEMIES ====================
function updateEnemies() {
  const lv = LEVELS[currentLevel];
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    if (e.type === 'boss') {
      if (e.flashTimer > 0) e.flashTimer--;
      e.x += e.vx * 0.8;
      if (e.x < 14*TILE || e.x + e.w > 25*TILE) e.vx *= -1;

      // Boss shooting - multi-phase
      e.shootTimer++;
      let shootInterval, pattern;
      if (e.hp >= 3) {
        shootInterval = 135;
        pattern = 'single';
      } else if (e.hp >= 2) {
        shootInterval = 90;
        pattern = 'spread';
      } else {
        shootInterval = 45;
        pattern = 'homing';
      }
      if (e.shootTimer >= shootInterval) {
        e.shootTimer = 0;
        const bx = e.x + e.w / 2;
        const by = e.y + e.h;
        if (pattern === 'single') {
          const dx = player.x - bx;
          const dy = player.y - by;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          bossProjectiles.push({ x: bx, y: by, vx: (dx / dist) * 2.1, vy: (dy / dist) * 2.1, life: 120 });
        } else if (pattern === 'spread') {
          for (let i = -1; i <= 1; i++) {
            const angle = (i * 15) * Math.PI / 180;
            const dx = player.x - bx;
            const dy = player.y - by;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const baseVx = (dx / dist) * 2.1;
            const baseVy = (dy / dist) * 2.1;
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            bossProjectiles.push({
              x: bx, y: by,
              vx: baseVx * cosA - baseVy * sinA,
              vy: baseVx * sinA + baseVy * cosA,
              life: 120
            });
          }
        } else if (pattern === 'homing') {
          const dx = player.x - bx;
          const dy = player.y - by;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          bossProjectiles.push({
            x: bx, y: by,
            vx: (dx / dist) * 4,
            vy: (dy / dist) * 4,
            life: 150,
            homing: true
          });
        }
      }
      continue;
    }
    if (e.type === 'bat') {
      e.x += e.vx;
      e.y = e.baseY + Math.sin(frameCount * 0.05) * 40;
      if (e.x < 0 || e.x + e.w > W) e.vx *= -1;
    } else {
      e.x += e.vx;
      let blocked = false;
      for (const p of lv.platforms) {
        if (aabb({ x: e.x, y: e.y, w: e.w, h: e.h }, p)) {
          blocked = true;
          break;
        }
      }
      let edgeCheck = { x: (e.vx > 0 ? e.x + e.w + 2 : e.x - 2), y: e.y + e.h + 2, w: e.w, h: 4 };
      let onEdge = false;
      for (const p of lv.platforms) {
        if (aabb(edgeCheck, p)) { onEdge = true; break; }
      }
      if (!onEdge) e.vx *= -1;
      if (blocked) e.vx *= -1;

      if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
      if (e.x + e.w > W) { e.x = W - e.w; e.vx = -Math.abs(e.vx); }
    }
  }
}

// ==================== DRAWING FUNCTIONS ====================
function drawBackground() {
  const lv = LEVELS[currentLevel];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lv.bgColorTop);
  grad.addColorStop(1, lv.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (currentLevel === 0) {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.5, '#98D8C8');
    skyGrad.addColorStop(1, '#2d5a1e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.6);

    const sunGlow = Math.sin(frameCount * 0.01) * 0.1 + 0.4;
    ctx.fillStyle = `rgba(255,200,50,${sunGlow})`;
    ctx.beginPath();
    ctx.arc(700, 80, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFE44D';
    ctx.beginPath();
    ctx.arc(700, 80, 30, 0, Math.PI * 2);
    ctx.fill();

    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 2000;
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 2000) + 2000) % 2000;
      const mGrad = ctx.createLinearGradient(wrapped, H - 100 - e.h, wrapped, H - 100);
      mGrad.addColorStop(0, '#3a6a2a');
      mGrad.addColorStop(1, '#2a4a1a');
      ctx.fillStyle = mGrad;
      ctx.beginPath();
      ctx.moveTo(wrapped - 20, H - 100);
      ctx.lineTo(wrapped + e.w / 2, H - 100 - e.h);
      ctx.lineTo(wrapped + e.w + 20, H - 100);
      ctx.fill();
    }

    const layer1 = PARALLAX_LAYERS[1];
    const off1 = (-player.x * layer1.speed) % 1800;
    for (const e of layer1.elements) {
      const ex = e.x + off1;
      const wrapped = ((ex % 1800) + 1800) % 1800;
      ctx.fillStyle = '#4a3020';
      ctx.fillRect(wrapped + 8, H - 160, 8, 120);
      const leafGrad = ctx.createRadialGradient(wrapped + 12, H - 160 - e.h / 2, 5, wrapped + 12, H - 160 - e.h / 2, e.h);
      leafGrad.addColorStop(0, '#5aaa3a');
      leafGrad.addColorStop(1, '#2a6a1a');
      ctx.fillStyle = leafGrad;
      ctx.beginPath();
      ctx.arc(wrapped + 12, H - 160 - e.h / 2, e.h / 2, 0, Math.PI * 2);
      ctx.fill();
    }

    const layer2 = PARALLAX_LAYERS[2];
    const off2 = (-player.x * layer2.speed) % 1200;
    for (const e of layer2.elements) {
      const ex = e.x + off2;
      const wrapped = ((ex % 1200) + 1200) % 1200;
      const grassH = e.h + Math.sin(frameCount * 0.03 + wrapped * 0.1) * 3;
      ctx.fillStyle = '#3a8a2a';
      ctx.fillRect(wrapped, H - 60 - grassH / 2, 4, grassH);
      ctx.fillStyle = '#55cc33';
      ctx.beginPath();
      ctx.arc(wrapped + 2, H - 60 - grassH, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#5aaa3a';
    for (let i = 0; i < 20; i++) {
      const fx = (i * 41 + 10) % W;
      const fy = H - 55 + Math.sin(i * 2.3) * 8;
      const bob = Math.sin(frameCount * 0.04 + i) * 2;
      ctx.fillStyle = i % 3 === 0 ? '#ff6b9d' : i % 3 === 1 ? '#FFD700' : '#fff';
      ctx.beginPath();
      ctx.arc(fx, fy + bob, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (currentLevel === 1) {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    skyGrad.addColorStop(0, '#FF6B35');
    skyGrad.addColorStop(0.4, '#FFA07A');
    skyGrad.addColorStop(0.7, '#FFD700');
    skyGrad.addColorStop(1, '#5a3a1e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.5);

    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 2000;
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 2000) + 2000) % 2000;
      const mGrad = ctx.createLinearGradient(wrapped, H - 100 - e.h, wrapped, H - 100);
      mGrad.addColorStop(0, '#8899aa');
      mGrad.addColorStop(0.6, '#667788');
      mGrad.addColorStop(1, '#445566');
      ctx.fillStyle = mGrad;
      ctx.beginPath();
      ctx.moveTo(wrapped, H - 100);
      ctx.lineTo(wrapped + 90, H - 100 - e.h);
      ctx.lineTo(wrapped + 180, H - 100);
      ctx.fill();
      ctx.fillStyle = '#e8e8e8';
      ctx.beginPath();
      ctx.moveTo(wrapped + 60, H - 100 - e.h + 40);
      ctx.lineTo(wrapped + 90, H - 100 - e.h);
      ctx.lineTo(wrapped + 120, H - 100 - e.h + 40);
      ctx.fill();
    }

    for (let i = 0; i < 5; i++) {
      const cx = ((i * 200 + frameCount * 0.3) % (W + 100)) - 50;
      const cy = 60 + i * 30;
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(cx, cy, 20 + i * 5, 0, Math.PI * 2);
      ctx.arc(cx + 15, cy - 5, 15 + i * 3, 0, Math.PI * 2);
      ctx.arc(cx - 10, cy + 3, 12 + i * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    const layer2 = PARALLAX_LAYERS[2];
    const off2 = (-player.x * layer2.speed) % 1200;
    for (const e of layer2.elements) {
      const ex = e.x + off2;
      const wrapped = ((ex % 1200) + 1200) % 1200;
      ctx.fillStyle = '#5a4a2a';
      ctx.fillRect(wrapped, H - 50, 20, e.h);
      ctx.fillRect(wrapped + 3, H - 50 - e.h, 14, e.h);
      ctx.fillStyle = '#ddd';
      ctx.fillRect(wrapped + 3, H - 50 - e.h, 14, 4);
    }
  } else {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0015');
    skyGrad.addColorStop(0.3, '#1a0a3a');
    skyGrad.addColorStop(0.7, '#0f0a2a');
    skyGrad.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 40; i++) {
      const sx = (i * 23 + 5) % W;
      const sy = (i * 37 + 10) % (H * 0.7);
      const twinkle = Math.sin(frameCount * 0.05 + i * 1.7) * 0.4 + 0.5;
      ctx.fillStyle = `rgba(200,220,255,${twinkle})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + Math.sin(i * 0.8) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 1800;
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 1800) + 1800) % 1800;
      ctx.fillStyle = '#1a0a2e';
      ctx.beginPath();
      ctx.moveTo(wrapped, 0);
      ctx.lineTo(wrapped + 16, e.h);
      ctx.lineTo(wrapped + 32, 0);
      ctx.fill();
    }

    for (let i = 0; i < 8; i++) {
      const cx = (i * 120 + 50) % W;
      const cy = 200 + Math.sin(i * 2.1) * 150;
      const pulse = Math.sin(frameCount * 0.03 + i * 1.3) * 0.3 + 0.7;
      const colors = ['rgba(100,200,255,0.3)', 'rgba(200,100,255,0.3)', 'rgba(100,255,200,0.3)'];
      const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
      cGrad.addColorStop(0, colors[i % 3].replace('0.3', String(0.5 * pulse)));
      cGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, 20, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(180,220,255,${pulse * 0.8})`;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 15);
      ctx.lineTo(cx - 5, cy);
      ctx.lineTo(cx, cy + 5);
      ctx.lineTo(cx + 5, cy);
      ctx.fill();
    }
  }
}

function drawPlatforms() {
  const lv = LEVELS[currentLevel];
  for (const p of lv.platforms) {
    if (p.y >= (GRID - 1) * TILE) {
      if (currentLevel === 0) {
        ctx.fillStyle = '#5a3a20';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        for (let dx = 0; dx < p.w; dx += 8) {
          ctx.fillStyle = '#6a4a2a';
          ctx.fillRect(p.x + dx, p.y + 6, 3, p.h - 6);
        }
        ctx.fillStyle = '#4a8a2a';
        ctx.fillRect(p.x, p.y, p.w, 5);
        ctx.fillStyle = '#5aaa3a';
        ctx.fillRect(p.x, p.y, p.w, 2);
        for (let dx = 0; dx < p.w; dx += 12) {
          const gh = 3 + Math.sin(dx * 0.5 + p.x) * 2;
          ctx.fillStyle = '#5aaa3a';
          ctx.fillRect(p.x + dx, p.y - gh, 3, gh);
          ctx.fillStyle = '#6acc44';
          ctx.fillRect(p.x + dx, p.y - gh, 2, 2);
        }
      } else if (currentLevel === 1) {
        ctx.fillStyle = '#7a5a30';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        for (let dx = 0; dx < p.w; dx += 10) {
          ctx.fillStyle = '#8a6a3a';
          ctx.fillRect(p.x + dx, p.y + 4, 4, p.h - 4);
        }
        ctx.fillStyle = '#9a7a4a';
        ctx.fillRect(p.x, p.y, p.w, 3);
        ctx.fillStyle = '#6a4a20';
        ctx.fillRect(p.x, p.y + p.h - 2, p.w, 2);
      } else {
        ctx.fillStyle = '#3a3a5a';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        for (let dx = 0; dx < p.w; dx += 6) {
          ctx.fillStyle = `rgba(100,100,150,${0.3 + Math.sin(dx * 0.3) * 0.15})`;
          ctx.fillRect(p.x + dx, p.y + 2, 2, p.h - 2);
        }
        ctx.fillStyle = '#5a5a7a';
        ctx.fillRect(p.x, p.y, p.w, 3);
        ctx.fillStyle = '#2a2a4a';
        ctx.fillRect(p.x, p.y + p.h - 2, p.w, 2);
      }
      continue;
    }
    if (currentLevel === 0) {
      ctx.fillStyle = '#6a4a2a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      for (let dx = 0; dx < p.w; dx += 8) {
        ctx.fillStyle = '#7a5a34';
        ctx.fillRect(p.x + dx, p.y + 5, 3, p.h - 5);
      }
      ctx.fillStyle = '#5aaa3a';
      ctx.fillRect(p.x, p.y - 2, p.w, 6);
      ctx.fillStyle = '#6acc44';
      ctx.fillRect(p.x, p.y - 2, p.w, 2);
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(p.x, p.y + p.h - 3, p.w, 3);
    } else if (currentLevel === 1) {
      ctx.fillStyle = '#7a5a2a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      for (let dx = 0; dx < p.w; dx += 10) {
        ctx.fillStyle = '#8a6a34';
        ctx.fillRect(p.x + dx, p.y + 4, 4, p.h - 4);
        ctx.fillStyle = '#6a4a1a';
        ctx.fillRect(p.x + dx + 2, p.y + 8, 2, p.h - 8);
      }
      ctx.fillStyle = '#9a7a3a';
      ctx.fillRect(p.x, p.y, p.w, 3);
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(p.x, p.y + p.h - 2, p.w, 2);
    } else {
      ctx.fillStyle = '#4a4a6a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      for (let dx = 0; dx < p.w; dx += 6) {
        ctx.fillStyle = `rgba(120,120,170,${0.3 + Math.sin(dx * 0.2 + p.x * 0.1) * 0.2})`;
        ctx.fillRect(p.x + dx, p.y + 3, 2, p.h - 3);
      }
      ctx.fillStyle = '#6a6a8a';
      ctx.fillRect(p.x, p.y, p.w, 3);
      ctx.fillStyle = '#3a3a5a';
      ctx.fillRect(p.x, p.y + p.h - 2, p.w, 2);
      if (Math.sin(p.x * 0.1) > 0.5) {
        ctx.fillStyle = 'rgba(100,200,255,0.15)';
        ctx.beginPath();
        ctx.arc(p.x + p.w / 2, p.y + p.h / 2, p.w / 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawPlayer() {
  const g = GOURDS[currentChar];
  const px = Math.round(player.x);
  const py = Math.round(player.y);

  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2 === 0) return;
  if (stealthTimer > 0) {
    ctx.globalAlpha = 0.3;
  }

  ctx.save();
  if (player.facing < 0) {
    ctx.translate(px + player.w / 2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(px + player.w / 2), 0);
  }

  const scale = 2;
  const spriteX = px - 11;
  const spriteY = py - 6;

  const currentSprite = !player.onGround ? ANIM_JUMP[0] : ANIM_WALK[animFrame];

  const tempColors = { ...PIXEL_COLORS };
  tempColors['R'] = g.color;
  tempColors['r'] = g.dark;
  
  currentSprite.forEach((row, rowIndex) => {
    row.split('').forEach((pixel, colIndex) => {
      if (pixel !== '_' && tempColors[pixel]) {
        ctx.fillStyle = tempColors[pixel];
        ctx.fillRect(spriteX + colIndex * scale, spriteY + rowIndex * scale, scale, scale);
      }
    });
  });

  ctx.fillStyle = g.color;
  ctx.beginPath();
  ctx.ellipse(px + player.w / 2, py - 4, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = g.dark;
  ctx.beginPath();
  ctx.ellipse(px + player.w / 2, py - 6, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a8a2a';
  ctx.fillRect(px + player.w / 2 - 1, py - 10, 2, 4);

  if (player.ability === 'fireBreath' && keys['KeyK']) {
    ctx.fillStyle = 'rgba(255,100,0,0.4)';
    ctx.beginPath();
    ctx.arc(px + player.w / 2 + player.facing * 20, py + player.h / 2 - 4, 15, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function updateFireBalls() {
  fireBalls = fireBalls.filter(fb => {
    fb.x += fb.vx;
    fb.y += fb.vy;
    fb.life--;
    return fb.life > 0 && fb.x > 0 && fb.x < W;
  });
}

function drawFireBalls() {
  for (const fb of fireBalls) {
    const fbGrad = ctx.createRadialGradient(fb.x, fb.y, 1, fb.x, fb.y, 8);
    fbGrad.addColorStop(0, '#ffee00');
    fbGrad.addColorStop(0.4, '#ff6600');
    fbGrad.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = fbGrad;
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemies() {
  const lv = LEVELS[currentLevel];
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    const ex = Math.round(e.x), ey = Math.round(e.y);

    if (e.type === 'snake') {
      const scale = 2;
      const sx = ex - 2;
      const sy = ey - 2;
      const sway = Math.sin(frameCount * 0.08 + ex * 0.1) * 2;
      drawPixelArt(ctx, sx + sway, sy, SPRITE_SNAKE, scale);
      ctx.fillStyle = 'rgba(0,200,0,0.2)';
      ctx.beginPath();
      ctx.arc(ex + 8, ey + 10, 12, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'scorpion') {
      const scale = 2;
      const sx = ex - 3;
      const sy = ey;
      drawPixelArt(ctx, sx, sy, SPRITE_SCORPION, scale);
      ctx.fillStyle = 'rgba(180,120,40,0.2)';
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 12, 14, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'bat') {
      const scale = 2;
      const sx = ex - 2;
      const sy = ey;
      const wingFlap = Math.sin(frameCount * 0.15) * 3;
      ctx.save();
      ctx.translate(ex + 12, ey + 10);
      ctx.scale(1, 1 + wingFlap * 0.05);
      ctx.translate(-(ex + 12), -(ey + 10));
      drawPixelArt(ctx, sx, sy, SPRITE_BAT, scale);
      ctx.restore();
      ctx.fillStyle = 'rgba(150,0,0,0.15)';
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 8, 10, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'boss') {
      if (e.flashTimer > 0) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex, ey, e.w, e.h);
        ctx.globalAlpha = 1;
      } else {
        const scale = 3;
        const sx = ex - 12;
        const sy = ey - 6;
        const pulse = Math.sin(frameCount * 0.05) * 2;
        drawPixelArt(ctx, sx, sy + pulse, SPRITE_BOSS, scale);
        const auraGrad = ctx.createRadialGradient(ex + e.w/2, ey + e.h/2, 10, ex + e.w/2, ey + e.h/2, 40);
        const hpRatio = e.hp / e.maxHp;
        if (hpRatio > 0.5) {
          auraGrad.addColorStop(0, 'rgba(150,50,255,0.2)');
          auraGrad.addColorStop(1, 'rgba(150,50,255,0)');
        } else {
          auraGrad.addColorStop(0, 'rgba(255,50,50,0.3)');
          auraGrad.addColorStop(1, 'rgba(255,50,50,0)');
        }
        ctx.fillStyle = auraGrad;
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + e.h/2, 40, 0, Math.PI * 2);
        ctx.fill();
      }
      const barW = e.w + 10;
      const barH = 10;
      const barX = ex - 5;
      const barY = ey - 22;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.roundRect(barX - 1, barY - 1, barW + 2, barH + 2, 3);
      ctx.fill();
      const hpColor = e.hp > 2 ? '#44cc44' : e.hp > 1 ? '#ffaa00' : '#ff4444';
      ctx.fillStyle = hpColor;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * (e.hp / e.maxHp), barH, 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW, barH, 3);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "Noto Sans SC", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('蛇精 ' + e.hp + '/' + e.maxHp, barX + barW / 2, barY - 4);
    }
  }
}

function drawBottles() {
  const lv = LEVELS[currentLevel];
  for (const b of lv.bottles) {
    if (b.collected) continue;
    const bx = Math.round(b.x), by = Math.round(b.y);
    const bob = Math.sin(frameCount * 0.05 + bx) * 4;
    const scale = 2;

    const outerGlow = Math.sin(frameCount * 0.08 + bx * 0.1) * 0.15 + 0.35;
    const glowGrad = ctx.createRadialGradient(bx + 8, by + 10 + bob, 2, bx + 8, by + 10 + bob, 20);
    glowGrad.addColorStop(0, `rgba(100,255,100,${outerGlow})`);
    glowGrad.addColorStop(0.5, `rgba(50,200,50,${outerGlow * 0.5})`);
    glowGrad.addColorStop(1, 'rgba(0,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(bx + 8, by + 10 + bob, 20, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(bx + 8, by + 10 + bob);
    const rot = Math.sin(frameCount * 0.03 + bx) * 0.1;
    ctx.rotate(rot);
    drawPixelArt(ctx, -8, -10, SPRITE_BOTTLE, scale);
    ctx.restore();

    for (let i = 0; i < 3; i++) {
      const sparkAngle = frameCount * 0.06 + i * 2.1;
      const sparkR = 14 + Math.sin(frameCount * 0.1 + i) * 4;
      const sparkX = bx + 8 + Math.cos(sparkAngle) * sparkR;
      const sparkY = by + 10 + bob + Math.sin(sparkAngle) * sparkR;
      const sparkAlpha = Math.sin(frameCount * 0.12 + i * 1.5) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(255,255,150,${sparkAlpha})`;
      ctx.beginPath();
      ctx.arc(sparkX, sparkY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawCheckpoints() {
  const lv = LEVELS[currentLevel];
  for (const cp of lv.checkpoints) {
    const cx = cp.x, cy = cp.y;
    if (cp.active) {
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(cx + 14, cy, 4, 40);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(cx + 18, cy, 16, 12);
      const glow = Math.sin(frameCount * 0.1) * 0.2 + 0.5;
      const cpGrad = ctx.createRadialGradient(cx + 16, cy + 20, 5, cx + 16, cy + 20, 25);
      cpGrad.addColorStop(0, `rgba(255,215,0,${glow})`);
      cpGrad.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = cpGrad;
      ctx.beginPath();
      ctx.arc(cx + 16, cy + 20, 25, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(cx + 14, cy, 4, 40);
      ctx.fillStyle = '#666';
      ctx.fillRect(cx + 18, cy, 16, 12);
      ctx.fillStyle = 'rgba(150,150,150,0.15)';
      ctx.beginPath();
      ctx.arc(cx + 16, cy + 20, 15, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawExit() {
  const lv = LEVELS[currentLevel];
  if (!lv.exit) return;
  const ex = lv.exit;
  const canExit = currentLevel < 2 || lv.bossDefeated;
  const glow = Math.sin(frameCount * 0.08) * 0.3 + 0.7;

  if (canExit) {
    const exitGrad = ctx.createRadialGradient(ex.x + ex.w/2, ex.y + ex.h/2, 5, ex.x + ex.w/2, ex.y + ex.h/2, 30);
    exitGrad.addColorStop(0, `rgba(100,200,255,${glow * 0.6})`);
    exitGrad.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = exitGrad;
    ctx.beginPath();
    ctx.arc(ex.x + ex.w/2, ex.y + ex.h/2, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(100,200,255,${glow})`;
    ctx.fillRect(ex.x + 2, ex.y + 4, ex.w - 4, ex.h - 4);
    ctx.fillStyle = '#0af';
  } else {
    ctx.fillStyle = `rgba(150,50,50,${glow})`;
    ctx.fillRect(ex.x + 2, ex.y + 4, ex.w - 4, ex.h - 4);
    ctx.fillStyle = '#a33';
  }
  ctx.fillRect(ex.x, ex.y, ex.w, ex.h);
  ctx.fillStyle = '#fff';
  ctx.font = '16px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(canExit ? '▶' : '🔒', ex.x + ex.w / 2, ex.y + ex.h / 2 + 5);
}

function drawMenu() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#302b63');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 30; i++) {
    const sx = (i * 97 + frameCount * 0.2) % W;
    const sy = (i * 67) % H;
    const alpha = 0.2 + Math.sin(frameCount * 0.02 + i) * 0.15;
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  const titleGlow = Math.sin(frameCount * 0.03) * 0.3 + 0.7;
  ctx.save();
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = 20 * titleGlow;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 52px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('葫芦兄弟：拯救爷爷', W / 2, 75);
  ctx.restore();

  ctx.fillStyle = 'rgba(200,200,200,0.8)';
  ctx.font = '16px "Noto Sans SC", sans-serif';
  ctx.fillText('选择你的葫芦娃开始冒险', W / 2, 110);

  ctx.fillStyle = '#ff6666';
  ctx.font = '14px "Noto Sans SC", monospace';
  ctx.fillText('当前生命数: ×' + lives, W / 2, 138);

  const startX = 60;
  const spacing = 105;
  for (let i = 0; i < 7; i++) {
    const x = startX + i * spacing;
    const y = 160;

    const hover = Math.sin(frameCount * 0.04 + i * 0.8) * 3;
    const cardY = y + hover;

    const cardGrad = ctx.createLinearGradient(x - 5, cardY - 5, x - 5, cardY + 195);
    cardGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
    cardGrad.addColorStop(1, 'rgba(255,255,255,0.03)');
    ctx.fillStyle = cardGrad;
    ctx.beginPath();
    ctx.roundRect(x - 5, cardY - 5, 90, 200, 8);
    ctx.fill();

    ctx.strokeStyle = GOURDS[i].color + '66';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x - 5, cardY - 5, 90, 200, 8);
    ctx.stroke();

    const glowAlpha = Math.sin(frameCount * 0.05 + i) * 0.15 + 0.2;
    ctx.fillStyle = GOURDS[i].color + Math.floor(glowAlpha * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(x + 40, cardY + 45, 30, 0, Math.PI * 2);
    ctx.fill();

    const menuScale = 5;
    const tempColors = { ...PIXEL_COLORS };
    tempColors['R'] = GOURDS[i].color;
    tempColors['r'] = GOURDS[i].dark;
    SPRITE_GOURD.forEach((row, rowIndex) => {
      row.split('').forEach((pixel, colIndex) => {
        if (pixel !== '_' && tempColors[pixel]) {
          ctx.fillStyle = tempColors[pixel];
          ctx.fillRect(x + 5 + colIndex * menuScale, cardY + 5 + rowIndex * menuScale, menuScale, menuScale);
        }
      });
    });

    ctx.fillStyle = GOURDS[i].color;
    ctx.font = 'bold 15px "Noto Sans SC", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(GOURDS[i].name, x + 40, cardY + 100);

    ctx.fillStyle = '#ffd700';
    ctx.font = '11px "Noto Sans SC", monospace';
    ctx.fillText(CHARACTER_ABILITIES[i].ability, x + 40, cardY + 118);

    ctx.fillStyle = 'rgba(180,180,180,0.8)';
    ctx.font = '10px "Noto Sans SC", monospace';
    const desc = CHARACTER_ABILITIES[i].desc;
    if (desc.length > 8) {
      ctx.fillText(desc.substring(0, 8), x + 40, cardY + 136);
      ctx.fillText(desc.substring(8), x + 40, cardY + 150);
    } else {
      ctx.fillText(desc, x + 40, cardY + 136);
    }

    ctx.fillStyle = GOURDS[i].color + 'aa';
    ctx.font = '13px "Noto Sans SC", monospace';
    ctx.fillText('按 ' + (i + 1), x + 40, cardY + 180);
  }

  ctx.fillStyle = 'rgba(150,150,150,0.7)';
  ctx.font = '13px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WASD移动 | G跳跃 | 数字键1-7选择角色', W / 2, 460);
  ctx.fillText('从上方踩踏敌人消灭它们 | K使用特殊能力', W / 2, 485);
  ctx.fillText('收集葫芦瓶恢复生命 | 到达出口过关', W / 2, 510);
  ctx.fillText('ESC暂停 | M静音 | F1调试模式', W / 2, 535);

  ctx.fillStyle = 'rgba(100,100,100,0.5)';
  ctx.font = '11px "Noto Sans SC", monospace';
  ctx.fillText('纯HTML5 Canvas游戏 | 无外部依赖', W / 2, H - 25);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.6)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 56px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', W / 2, H / 2 - 40);
  ctx.restore();

  ctx.fillStyle = '#ffd700';
  ctx.font = '24px "Noto Sans SC", monospace';
  ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);

  ctx.fillStyle = 'rgba(200,200,200,0.8)';
  ctx.font = '18px "Noto Sans SC", monospace';
  ctx.fillText('按 R 重新开始', W / 2, H / 2 + 70);
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 8; i++) {
    const fx = W / 2 + Math.sin(frameCount * 0.03 + i * 0.9) * 250;
    const fy = 120 + Math.cos(frameCount * 0.02 + i * 1.1) * 100;
    const colors = ['#ff6b6b', '#ffd700', '#4ecdc4', '#a78bfa', '#ff69b4', '#00ff88', '#00ccff', '#ff8c00'];
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.arc(fx, fy, 10 + Math.sin(frameCount * 0.1 + i) * 5, 0, Math.PI * 2);
    ctx.fill();
    for (let j = 0; j < 8; j++) {
      const angle = (j / 8) * Math.PI * 2 + frameCount * 0.02;
      const len = 18 + Math.sin(frameCount * 0.1 + j) * 10;
      ctx.strokeStyle = colors[(i + j) % 8];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + Math.cos(angle) * len, fy + Math.sin(angle) * len);
      ctx.stroke();
    }
  }

  ctx.save();
  ctx.shadowColor = 'rgba(255,215,0,0.8)';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 56px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('恭喜通关！', W / 2, H / 2 - 40);
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = '24px "Noto Sans SC", monospace';
  ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);

  ctx.fillStyle = '#4ecdc4';
  ctx.font = '20px "Noto Sans SC", monospace';
  ctx.fillText('葫芦娃们成功打败了蛇精！', W / 2, H / 2 + 60);

  ctx.fillStyle = 'rgba(200,200,200,0.8)';
  ctx.font = '18px "Noto Sans SC", monospace';
  ctx.fillText('按 R 返回菜单', W / 2, H / 2 + 110);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px "Noto Sans SC", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('游戏暂停', W / 2, H / 2 - 60);
  ctx.restore();

  ctx.fillStyle = '#ccc';
  ctx.font = '24px "Noto Sans SC", monospace';
  ctx.fillText('按 ESC 继续游戏', W / 2, H / 2 + 10);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px "Noto Sans SC", monospace';
  ctx.fillText('按 M ' + (gameMuted ? '取消静音' : '静音'), W / 2, H / 2 + 60);
  ctx.fillText('按 R 返回菜单', W / 2, H / 2 + 90);

  ctx.fillStyle = gameMuted ? '#f44' : '#4f4';
  ctx.font = '16px "Noto Sans SC", monospace';
  ctx.fillText(gameMuted ? '已静音' : '声音开启', W / 2, H / 2 + 130);
}

function drawHUD() {
  const g = GOURDS[currentChar];

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(8, 8, 36, 36, 6);
  ctx.fill();
  ctx.fillStyle = g.color;
  ctx.fillRect(12, 12, 28, 28);
  ctx.fillStyle = '#fff';
  ctx.fillRect(16, 18, 4, 4);
  ctx.fillRect(26, 18, 4, 4);

  if (player.ability) {
    const ab = CHARACTER_ABILITIES[currentChar];
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Noto Sans SC", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(ab.name + '·' + ab.ability, 50, 24);
    ctx.fillStyle = g.color;
    ctx.font = '10px "Noto Sans SC", monospace';
    ctx.fillText(ab.desc, 50, 38);
  }

  if (comboCounter >= 2) {
    const comboGlow = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,215,0,${comboGlow})`;
    ctx.font = 'bold 18px "Noto Sans SC", monospace';
    ctx.textAlign = 'right';
    const comboText = comboCounter >= 5 ? 'UNSTOPPABLE x' + comboCounter : 'x' + comboCounter + ' COMBO';
    ctx.fillText(comboText, W - 10, 26);
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    const barW = Math.min(comboTimer / COMBO_TIMEOUT, 1) * 140;
    ctx.beginPath();
    ctx.roundRect(W - 150, 32, barW, 5, 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(W - 150, 32, barW, 3, 1);
    ctx.fill();
  }

  if (stealthTimer > 0) {
    ctx.fillStyle = 'rgba(100,200,255,0.8)';
    ctx.font = '14px "Noto Sans SC", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('隐身中 ' + Math.ceil(stealthTimer / 60) + 's', W / 2, H - 20);
  }

  if (currentLevel === 2) {
    const lv = LEVELS[2];
    const boss = lv.enemies.find(e => e.type === 'boss' && e.alive);
    if (boss) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.roundRect(W / 2 - 102, 8, 204, 16, 4);
      ctx.fill();
      const hpRatio = boss.hp / boss.maxHp;
      const hpColor = hpRatio > 0.5 ? '#ff4444' : hpRatio > 0.25 ? '#ff8800' : '#ff0000';
      ctx.fillStyle = hpColor;
      ctx.beginPath();
      ctx.roundRect(W / 2 - 100, 10, 200 * hpRatio, 12, 3);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(W / 2 - 100, 10, 200, 12, 4);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "Noto Sans SC", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('蛇精 ' + boss.hp + '/' + boss.maxHp, W / 2, 20);
    }
  }
}

// ==================== MAIN GAME LOOP ====================
function gameLoop(timestamp) {
  frameCount++;

  // FPS calculation
  const delta = timestamp - lastFrameTime;
  lastFrameTime = timestamp;
  fpsTimer += delta;
  fpsCount++;
  if (fpsTimer >= 1000) {
    fps = fpsCount;
    fpsCount = 0;
    fpsTimer = 0;
  }

  ctx.clearRect(0, 0, W, H);

  if (gameState === 'menu') {
    drawMenu();
  } else if (gameState === 'playing') {
    if (!gamePaused) {
      updateMovingPlatforms();
      updateTraps();
      updatePlayer();
      updateEnemies();
      updateBossProjectiles();
      updateFireBalls();
      particleSystem.update();
      screenShake.update();
      updateFloatingTexts();
      if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboCounter = 0;
      }
    }

    screenShake.apply(ctx);
    drawBackground();
    drawPlatforms();
    drawMovingPlatforms();
    drawTraps();
    drawCheckpoints();
    drawBottles();
    drawExit();
    drawBossProjectiles();
    drawFireBalls();
    drawEnemies();
    drawPlayer();
    drawFloatingTexts();
    particleSystem.draw(ctx);
    screenShake.restore(ctx);
    drawHUD();

    if (gamePaused) {
      drawPauseOverlay();
    }

    // Debug mode
    if (debugMode) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(10, H - 60, 200, 50);
      ctx.fillStyle = '#0f0';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('FPS: ' + fps, 16, H - 42);
      ctx.fillText('粒子: ' + particleSystem.particles.length, 16, H - 26);
      ctx.fillText('关卡: ' + (currentLevel + 1) + ' | 暂停: ' + gamePaused, 16, H - 10);
    }
  } else if (gameState === 'gameover') {
    drawBackground();
    drawPlatforms();
    drawGameOver();
  } else if (gameState === 'victory') {
    particleSystem.update();
    drawVictory();
    particleSystem.draw(ctx);
  }

  requestAnimationFrame(gameLoop);
}

// ==================== INPUT HANDLING ====================
document.addEventListener('keydown', (e) => {
  // Initialize audio on first interaction
  sound.init();

  keys[e.code] = true;

  // ESC - Pause/Resume
  if (e.code === 'Escape') {
    if (gameState === 'playing') {
      gamePaused = !gamePaused;
      if (gamePaused) music.stop();
      else music.playLevelMusic(currentLevel);
    }
  }

  // M - Mute/Unmute
  if (e.code === 'KeyM') {
    sound.toggle();
    if (gameMuted) music.stop();
    else if (gameState === 'menu') music.playMenuMusic();
    else if (gameState === 'playing' && !gamePaused) music.playLevelMusic(currentLevel);
  }

  // F1 - Debug mode
  if (e.code === 'F1') {
    e.preventDefault();
    debugMode = !debugMode;
  }

  // R - Restart
  if (e.code === 'KeyR') {
    if (gameState === 'gameover' || gameState === 'victory') {
      music.stop();
      gameState = 'menu';
      score = 0;
      comboCounter = 0;
      comboTimer = 0;
      floatingTexts = [];
      particleSystem.particles = [];
      music.playMenuMusic();
    } else if (gameState === 'playing') {
      resetPlayer();
      buildLevel(currentLevel);
      score = 0;
      comboCounter = 0;
      comboTimer = 0;
      floatingTexts = [];
      updateUI();
    }
  }

  // Character selection (menu only)
  if (gameState === 'menu') {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 7) {
      startGame(num - 1);
    }
  }

  // Prevent scrolling
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ==================== START ====================
updateUI();
music.init();
music.playMenuMusic();
gameLoop(performance.now());
</script>
