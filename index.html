<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>葫芦兄弟：拯救爷爷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Sans SC', sans-serif;
  color: #eee;
}
#game {
  width: 900px;
  min-height: 600px;
  background: #1a1a2e;
  border-radius: 16px;
  border: 3px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,0.3);
  overflow: hidden;
}
#scene {
  width: 100%;
  height: 350px;
  position: relative;
  overflow: hidden;
}
#dialogue {
  padding: 20px 30px;
  min-height: 200px;
  background: rgba(0,0,0,0.5);
}
#speaker {
  font-size: 18px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
}
#text {
  font-size: 16px;
  line-height: 1.8;
  color: #fff;
  min-height: 60px;
}
#choices {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  padding: 12px 20px;
  background: linear-gradient(135deg, #4a4a6a, #2a2a4a);
  border: 2px solid #666;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
}
.choice-btn:hover {
  background: linear-gradient(135deg, #6a6a9a, #4a4a7a);
  border-color: #ffd700;
  transform: translateX(5px);
}
#stats {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  border-top: 2px solid #333;
}
.stat {
  text-align: center;
}
.stat-label {
  font-size: 12px;
  color: #888;
}
.stat-value {
  font-size: 20px;
  font-weight: bold;
}
.stat-value.hp { color: #ff6b6b; }
.stat-value.power { color: #ffd700; }
.stat-value.brave { color: #4ecdc4; }
#chapter {
  text-align: center;
  padding: 10px;
  background: rgba(255,215,0,0.1);
  font-size: 14px;
  color: #ffd700;
}
canvas { display: none; }
</style>
</head>
<body>
<div id="game">
  <div id="chapter">第一章：森林遇险</div>
  <div id="scene">
    <canvas id="gameCanvas" width="900" height="350"></canvas>
  </div>
  <div id="dialogue">
    <div id="speaker">旁白</div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
  <div id="stats">
    <div class="stat">
      <div class="stat-label">生命值</div>
      <div class="stat-value hp" id="hpDisplay">100</div>
    </div>
    <div class="stat">
      <div class="stat-label">战斗力</div>
      <div class="stat-value power" id="powerDisplay">10</div>
    </div>
    <div class="stat">
      <div class="stat-label">勇气</div>
      <div class="stat-value brave" id="braveDisplay">50</div>
    </div>
    <div class="stat">
      <div class="stat-label">章节</div>
      <div class="stat-value" id="chapterDisplay">1/5</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const player = {
  hp: 100,
  maxHp: 100,
  power: 10,
  brave: 50,
  chapter: 0,
  choices: []
};

const chapters = [
  {
    title: '第一章：森林遇险',
    scenes: [
      {
        background: 'forest',
        speaker: '旁白',
        text: '葫芦娃们正在森林中寻找被蛇精抓走的爷爷。突然，草丛中传来沙沙声...',
        choices: null,
        next: 1
      },
      {
        background: 'forest',
        speaker: '🐍 蛇精手下',
        text: '哈哈哈，又来送死的小葫芦！你们的爷爷已经被我们大王抓走了，你们也别想活着离开！',
        choices: [
          { text: '⚔️ 战斗！我们不会怕你的！', effect: { brave: 10, power: 5 }, next: 2 },
          { text: '🤝 我们可以谈谈吗？放了爷爷，我们给你好处', effect: { brave: -5 }, next: 3 },
          { text: '🏃 快跑！我们先撤退', effect: { brave: -10 }, next: 4 }
        ]
      },
      {
        background: 'battle',
        speaker: '葫芦娃',
        text: '你使出全力与蛇精手下战斗！经过一番激战，你成功击败了敌人，获得了宝贵的经验。',
        choices: null,
        effect: { power: 10, hp: -10 },
        next: 5
      },
      {
        background: 'forest',
        speaker: '🐍 蛇精手下',
        text: '哦？你倒是挺聪明的。不过我们大王想要的是葫芦娃的法力，不是什么好处。但是...如果你愿意告诉我其他葫芦娃的下落，我可以放你走。',
        choices: [
          { text: '🙅 绝不背叛兄弟！', effect: { brave: 20, power: 5 }, next: 5 },
          { text: '🤥 好吧，我告诉你...', effect: { brave: -30 }, next: 6 }
        ]
      },
      {
        background: 'forest',
        speaker: '葫芦娃',
        text: '你转身逃跑，但不小心被树枝绊倒，受了轻伤。不过至少安全了。',
        choices: null,
        effect: { hp: -20, brave: -5 },
        next: 5
      },
      {
        background: 'forest',
        speaker: '蛇精手下',
        text: '很好，你很识时务！不过...我还是要抓你回去交差！哈哈哈！',
        choices: null,
        effect: { hp: -30, brave: -20 },
        next: 7
      },
      {
        background: 'forest',
        speaker: '旁白',
        text: '你继续前进，来到了森林的深处。这里更加阴暗潮湿...',
        choices: null,
        next: 8
      },
      {
        background: 'forest',
        speaker: '💀 蝎子精',
        text: '嘿嘿嘿，又有猎物送上门了！我是蝎子精，这片森林归我管！',
        choices: [
          { text: '⚔️ 来吧！我不怕你！', condition: { brave: 40 }, effect: { power: 15 }, next: 9 },
          { text: '🤝 也许我们可以合作？', effect: { brave: -5 }, next: 10 },
          { text: '🧘 使用爷爷教的法术', condition: { power: 20 }, effect: { power: 10 }, next: 11 }
        ]
      },
      {
        background: 'battle',
        speaker: '葫芦娃',
        text: '你勇敢地与蝎子精战斗！虽然受伤了，但你的勇气让你更加强大！',
        choices: null,
        effect: { hp: -15, power: 5 },
        next: 12
      },
      {
        background: 'forest',
        speaker: '💀 蝎子精',
        text: '合作？有意思...蛇精确实太霸道了。如果你愿意帮我夺取蛇精的宝物，我可以告诉你爷爷被关在哪里。',
        choices: [
          { text: '✅ 好，我们合作', effect: { brave: 10 }, next: 12 },
          { text: '❌ 不行，我要救爷爷', effect: { brave: 15 }, next: 12 }
        ]
      },
      {
        background: 'forest',
        speaker: '💀 蝎子精',
        text: '什么法术！你...你怎么会这个！好吧，我承认你有点本事。你走吧，我不为难你。',
        choices: null,
        effect: { brave: 10 },
        next: 12
      },
      {
        background: 'forest',
        speaker: '旁白',
        text: '你终于走出了森林，来到了一座高山脚下。这就是传说中的蛇精洞府所在的山峰！',
        choices: null,
        next: 13
      },
      {
        background: 'mountain',
        speaker: '🦇 蝙蝠王',
        text: '这里是通往蛇精洞府的必经之路。想要过去，必须回答我的问题！',
        choices: [
          { text: '📝 问吧，我不怕', effect: { brave: 10 }, next: 14 },
          { text: '💪 直接打过去！', effect: { power: -5 }, next: 15 }
        ]
      },
      {
        background: 'mountain',
        speaker: '🦇 蝙蝠王',
        text: '问题：什么东西越分享越多？',
        choices: [
          { text: '❤️ 爱', effect: { brave: 20, hp: 30 }, next: 16 },
          { text: '💰 金钱', effect: { brave: -10 }, next: 17 },
          { text: '🤔 不知道', effect: {}, next: 17 }
        ]
      },
      {
        background: 'battle',
        speaker: '蝙蝠王',
        text: '蝙蝠群向你发起攻击！你奋力抵抗...',
        choices: null,
        effect: { hp: -25 },
        next: 16
      },
      {
        background: 'mountain',
        speaker: '🦇 蝙蝠王',
        text: '正确！爱是越分享越多的。你通过了考验，过去吧！',
        choices: null,
        effect: { brave: 10 },
        next: 16
      },
      {
        background: 'mountain',
        speaker: '🦇 蝙蝠王',
        text: '错了！答案是爱。不过看你这么努力的份上，还是让你过去吧。',
        choices: null,
        next: 16
      },
      {
        background: 'cave',
        speaker: '旁白',
        text: '你来到了蛇精洞府的入口。这里阴森恐怖，到处都是骷髅和毒蛇...',
        choices: null,
        next: 18
      },
      {
        background: 'cave',
        speaker: '🐍 蛇精',
        text: '哈哈哈！葫芦娃，你终于来了！你的爷爷就在我身后，想要救他？先过我这关！',
        choices: [
          { text: '⚔️ 决战吧！', effect: { power: 20, brave: 20 }, next: 19 },
          { text: '🗣️ 蛇精，你为什么要抓我爷爷？', effect: { brave: 10 }, next: 20 },
          { text: '🧘 集合所有兄弟的力量！', condition: { brave: 80 }, next: 21 }
        ]
      },
      {
        background: 'battle',
        speaker: '蛇精',
        text: '你与蛇精展开最终决战！这是一场艰苦的战斗...',
        choices: null,
        effect: { hp: -40 },
        next: 22
      },
      {
        background: 'cave',
        speaker: '🐍 蛇精',
        text: '为什么？因为你爷爷拥有强大的法力！只要我得到他的法力，我就能统治整个世界！',
        choices: [
          { text: '💔 我爷爷不会让你得逞的！', effect: { power: 15 }, next: 19 },
          { text: '🤝 放了爷爷，我把法力给你', effect: { brave: -50, hp: 50 }, next: 23 }
        ]
      },
      {
        background: 'cave',
        speaker: '旁白',
        text: '你呼唤其他六个兄弟，七彩葫芦娃的力量汇聚在一起！你释放出了终极技能！',
        choices: null,
        effect: { power: 50, hp: 50 },
        next: 24
      },
      {
        background: 'victory',
        speaker: '旁白',
        text: '🎉 恭喜你！你成功打败了蛇精，救出了爷爷！爷爷非常骄傲你们的表现！',
        choices: null,
        ending: true
      },
      {
        background: 'cave',
        speaker: '🐍 蛇精',
        text: '什么？你要把法力给我？好吧，我放了你爷爷。不过...下次可没这么容易了！',
        choices: null,
        effect: { hp: 30 },
        next: 25
      },
      {
        background: 'victory',
        speaker: '爷爷',
        text: '好孩子，你虽然牺牲了自己的法力，但你救了爷爷。法力可以慢慢恢复，但亲情是无价的！',
        choices: null,
        ending: true
      }
    ]
  }
];

let currentScene = 0;
let currentChapter = 0;
let textIndex = 0;
let displayedText = '';
let isTyping = false;
let typeCallback = null;

const backgrounds = {
  forest: () => {
    // 森林背景
    const grad = ctx.createLinearGradient(0, 0, 0, 350);
    grad.addColorStop(0, '#1a3a0e');
    grad.addColorStop(0.5, '#2d5a1e');
    grad.addColorStop(1, '#1a4a0e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 900, 350);
    
    // 树木
    ctx.fillStyle = '#3a2a0a';
    for (let i = 0; i < 8; i++) {
      const tx = i * 120 + 30;
      ctx.fillRect(tx, 150, 20, 200);
      ctx.fillStyle = '#2a6a1a';
      ctx.beginPath();
      ctx.arc(tx + 10, 130, 50, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a2a0a';
    }
    
    // 草地
    ctx.fillStyle = '#3a8a2a';
    ctx.fillRect(0, 320, 900, 30);
  },
  battle: () => {
    // 战斗背景
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(0, 0, 900, 350);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 60px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText('⚔️ 战斗！', 450, 200);
  },
  mountain: () => {
    // 山脉背景
    const grad = ctx.createLinearGradient(0, 0, 0, 350);
    grad.addColorStop(0, '#4a3a2a');
    grad.addColorStop(1, '#2a1a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 900, 350);
    
    // 山峰
    ctx.fillStyle = '#5a4a3a';
    for (let i = 0; i < 5; i++) {
      const mx = i * 200;
      ctx.beginPath();
      ctx.moveTo(mx, 350);
      ctx.lineTo(mx + 100, 80);
      ctx.lineTo(mx + 200, 350);
      ctx.fill();
    }
    
    // 雪顶
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 5; i++) {
      const mx = i * 200;
      ctx.beginPath();
      ctx.moveTo(mx + 60, 140);
      ctx.lineTo(mx + 100, 80);
      ctx.lineTo(mx + 140, 140);
      ctx.fill();
    }
  },
  cave: () => {
    // 洞穴背景
    ctx.fillStyle = '#1a0a2a';
    ctx.fillRect(0, 0, 900, 350);
    
    // 钟乳石
    ctx.fillStyle = '#3a2a4a';
    for (let i = 0; i < 10; i++) {
      const sx = i * 90 + 20;
      const sh = 50 + Math.sin(i * 2) * 30;
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx + 15, sh);
      ctx.lineTo(sx + 30, 0);
      ctx.fill();
    }
    
    // 发光水晶
    ctx.fillStyle = 'rgba(150,100,255,0.5)';
    for (let i = 0; i < 8; i++) {
      const gx = (i * 110 + 50) % 900;
      const gy = (i * 67 + 30) % 300 + 20;
      ctx.beginPath();
      ctx.arc(gx, gy, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  },
  victory: () => {
    // 胜利背景
    const grad = ctx.createLinearGradient(0, 0, 0, 350);
    grad.addColorStop(0, '#ffd700');
    grad.addColorStop(1, '#ff8c00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 900, 350);
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 80px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 胜利！', 450, 200);
  }
};

function drawScene() {
  const scene = chapters[currentChapter].scenes[currentScene];
  if (backgrounds[scene.background]) {
    backgrounds[scene.background]();
  }
}

function typeText(text, callback) {
  displayedText = '';
  textIndex = 0;
  isTyping = true;
  typeCallback = callback;
  
  const typeInterval = setInterval(() => {
    if (textIndex < text.length) {
      displayedText += text[textIndex];
      textIndex++;
      document.getElementById('text').textContent = displayedText;
    } else {
      clearInterval(typeInterval);
      isTyping = false;
      if (typeCallback) {
        typeCallback();
        typeCallback = null;
      }
    }
  }, 30);
}

function showDialogue(scene) {
  document.getElementById('speaker').textContent = scene.speaker;
  document.getElementById('text').textContent = '';
  
  if (scene.effect) {
    if (scene.effect.hp) player.hp = Math.min(player.maxHp, Math.max(0, player.hp + scene.effect.hp));
    if (scene.effect.power) player.power += scene.effect.power;
    if (scene.effect.brave) player.brave = Math.max(0, Math.min(100, player.brave + scene.effect.brave));
    updateStats();
  }
  
  typeText(scene.text, () => {
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    
    if (scene.choices && scene.choices.length > 0) {
      scene.choices.forEach((choice, index) => {
        if (choice.condition) {
          let canChoose = true;
          if (choice.condition.brave && player.brave < choice.condition.brave) canChoose = false;
          if (choice.condition.power && player.power < choice.condition.power) canChoose = false;
          if (!canChoose) return;
        }
        
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => {
          if (choice.effect) {
            if (choice.effect.hp) player.hp = Math.min(player.maxHp, Math.max(0, player.hp + choice.effect.hp));
            if (choice.effect.power) player.power += choice.effect.power;
            if (choice.effect.brave) player.brave = Math.max(0, Math.min(100, player.brave + choice.effect.brave));
            updateStats();
          }
          currentScene = choice.next;
          loadScene();
        };
        choicesDiv.appendChild(btn);
      });
    } else if (scene.next !== undefined && !scene.ending) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = '▶️ 继续';
      btn.onclick = () => {
        currentScene = scene.next;
        loadScene();
      };
      choicesDiv.appendChild(btn);
    }
  });
}

function loadScene() {
  const scene = chapters[currentChapter].scenes[currentScene];
  document.getElementById('choices').innerHTML = '';
  
  if (scene.ending) {
    document.getElementById('chapter').textContent = '🌟 游戏结束 - 感谢游玩！';
    document.getElementById('choices').innerHTML = '<button class="choice-btn" onclick="location.reload()">🔄 重新开始</button>';
  }
  
  drawScene();
  showDialogue(scene);
}

function updateStats() {
  document.getElementById('hpDisplay').textContent = player.hp;
  document.getElementById('powerDisplay').textContent = player.power;
  document.getElementById('braveDisplay').textContent = player.brave;
  document.getElementById('chapterDisplay').textContent = (currentChapter + 1) + '/5';
  
  if (player.hp <= 0) {
    document.getElementById('text').textContent = '💀 你倒下了...游戏结束';
    document.getElementById('choices').innerHTML = '<button class="choice-btn" onclick="location.reload()">🔄 重新开始</button>';
  }
}

loadScene();
</script>
</body>
</html>
