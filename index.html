function getComboScore(base) {
  const mult = [100, 150, 200, 300, 500];
  const idx = Math.min(comboCounter - 1, 4);
  return base === 100 ? mult[idx] : base;
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60, vy: -2 });
}

function updateFloatingTexts() {
  floatingTexts = floatingTexts.filter(ft => {
    ft.y += ft.vy;
    ft.life--;
    return ft.life > 0;
  });
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }
}

// ==================== PARALLAX SCROLLING ====================
function generateParallaxElements(type) {
  const elements = [];
  if (type === 0) {
    for (let i = 0; i < 8; i++) {
      elements.push({ x: i * 200, h: 120 + Math.sin(i * 1.3) * 60, w: 160 });
    }
  } else if (type === 1) {
    for (let i = 0; i < 12; i++) {
      elements.push({ x: i * 140, h: 80 + Math.sin(i * 2.1) * 30 });
    }
  } else {
    for (let i = 0; i < 20; i++) {
      elements.push({ x: i * 90, h: 15 + Math.sin(i * 1.7) * 8 });
    }
  }
  return elements;
}

function drawPixelArt(ctx, x, y, pixelData, scale) {
  const rows = pixelData.length;
  const cols = pixelData[0].length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = pixelData[r][c];
      if (ch === '_') continue;
      const color = PIXEL_COLORS[ch];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
}

// ==================== SOUND MANAGER (Web Audio API) ====================
class SoundManager {
  constructor() {
    this.audioCtx = null;
    this.muted = false;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch (e) {
      console.warn('Web Audio API not supported');
    }
  }

  toggle() {
    this.muted = !this.muted;
    gameMuted = this.muted;
  }

  playTone(frequency, duration, type, freqEnd, volume) {
    if (this.muted || !this.initialized) return;
    const osc = this.audioCtx.createOscillator();
    const gain = this.audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(frequency, this.audioCtx.currentTime);
    if (freqEnd) {
      osc.frequency.linearRampToValueAtTime(freqEnd, this.audioCtx.currentTime + duration);
    }
    gain.gain.setValueAtTime(volume || 0.15, this.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.audioCtx.destination);
    osc.start(this.audioCtx.currentTime);
    osc.stop(this.audioCtx.currentTime + duration);
  }

  jump() {
    this.playTone(200, 0.15, 'square', 600, 0.12);
  }

  collect() {
    this.playTone(500, 0.08, 'sine', 1200, 0.15);
    setTimeout(() => this.playTone(800, 0.1, 'sine', 1600, 0.12), 80);
  }

  hurt() {
    this.playTone(400, 0.2, 'square', 100, 0.15);
  }

  killEnemy() {
    this.playTone(300, 0.1, 'square', 800, 0.15);
    setTimeout(() => this.playTone(600, 0.1, 'square', 1200, 0.1), 100);
  }

  bossHurt() {
    this.playTone(200, 0.15, 'sawtooth', 500, 0.18);
  }

  checkpoint() {
    this.playTone(400, 0.1, 'sine', 800, 0.15);
    setTimeout(() => this.playTone(600, 0.15, 'sine', 1000, 0.12), 100);
    setTimeout(() => this.playTone(800, 0.2, 'sine', 1200, 0.1), 200);
  }

  victory() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => this.playTone(freq, 0.3, 'square', freq, 0.15), i * 150);
    });
  }

  bossDefeat() {
    for (let i = 0; i < 6; i++) {
      setTimeout(() => this.playTone(200 + i * 100, 0.2, 'sawtooth', 100 + i * 50, 0.2), i * 80);
    }
  }
}

// ==================== PARTICLE SYSTEM ====================
class Particle {
  constructor(x, y, color, vx, vy, size, life) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = vx;
    this.vy = vy;
    this.size = size;
    this.life = life;
    this.maxLife = life;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.life--;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
  }

  emit(x, y, count, colors, opts) {
    const speed = (opts && opts.speed) || 4;
    const size = (opts && opts.size) || 4;
    const life = (opts && opts.life) || 30;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      const color = colors[Math.floor(Math.random() * colors.length)];
      this.particles.push(new Particle(
        x, y, color,
        Math.cos(angle) * spd,
        Math.sin(angle) * spd - 2,
        size + Math.random() * 2,
        life + Math.random() * 15
      ));
    }
  }

  emitExplosion(x, y) {
    this.emit(x, y, 30, ['#ff0000', '#ff4444', '#ff8800', '#ffcc00', '#ffffff'], { speed: 6, size: 5, life: 40 });
  }

  emitCollect(x, y) {
    this.emit(x, y, 20, ['#ffd700', '#ffee44', '#ffffff', '#ffaa00'], { speed: 3, size: 3, life: 25 });
  }

  emitBossHit(x, y) {
    this.emit(x, y, 25, ['#9933ff', '#bb55ff', '#7700cc', '#ffffff', '#ff44ff'], { speed: 5, size: 4, life: 35 });
  }

  emitVictory(x, y) {
    this.emit(x, y, 50, ['#ffd700', '#ff0000', '#00ff00', '#00ccff', '#ff00ff', '#ffffff'], { speed: 8, size: 5, life: 60 });
  }

  update() {
    this.particles = this.particles.filter(p => {
      p.update();
      return p.life > 0;
    });
  }

  draw(ctx) {
    this.particles.forEach(p => p.draw(ctx));
  }
}

const particleSystem = new ParticleSystem();

// ==================== SCREEN SHAKE ====================
class ScreenShake {
  constructor() {
    this.intensity = 0;
    this.duration = 0;
    this.timer = 0;
    this.offsetX = 0;
    this.offsetY = 0;
  }

  shake(intensity, duration) {
    this.intensity = Math.max(this.intensity, intensity);
    this.duration = Math.max(this.duration, duration);
    this.timer = this.duration;
  }

  update() {
    if (this.timer > 0) {
      this.timer--;
      const progress = this.timer / this.duration;
      const currentIntensity = this.intensity * progress;
      this.offsetX = (Math.random() - 0.5) * currentIntensity * 2;
      this.offsetY = (Math.random() - 0.5) * currentIntensity * 2;
    } else {
      this.offsetX = 0;
      this.offsetY = 0;
      this.intensity = 0;
    }
  }

  apply(ctx) {
    if (this.timer > 0) {
      ctx.save();
      ctx.translate(this.offsetX, this.offsetY);
    }
  }

  restore(ctx) {
    if (this.timer > 0) {
      ctx.restore();
    }
  }
}

const screenShake = new ScreenShake();

let bossProjectiles = [];

function updateBossProjectiles() {
  bossProjectiles = bossProjectiles.filter(p => {
    if (p.homing) {
      const dx = player.x + player.w / 2 - p.x;
      const dy = player.y + player.h / 2 - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      p.vx += (dx / dist) * 0.3;
      p.vy += (dy / dist) * 0.3;
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 5) {
        p.vx = (p.vx / speed) * 5;
        p.vy = (p.vy / speed) * 5;
      }
    }
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0 && p.x > 0 && p.x < W && p.y > 0 && p.y < H;
  });
}

function drawBossProjectiles() {
  for (const p of bossProjectiles) {
    if (p.homing) {
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(p.x - 5, p.y - 5, 10, 10);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
      ctx.fillStyle = 'rgba(255,100,0,0.3)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#ff00ff';
      ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
      ctx.fillStyle = '#ff88ff';
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
  }
}

    });
    const bDefs = [[3*TILE,18*TILE],[11*TILE,14*TILE],[19*TILE,14*TILE],[6*TILE,11*TILE],[13*TILE,7*TILE]];
    bDefs.forEach(([bx,by]) => {

    lv.checkpoints = [

    ];
    lv.exit = { x: 24*TILE, y: (GRID-2)*TILE - 40, w: 32, h: 40 };
  } else {
    const pDefs = [
      [3,20],[7,18],[12,16],[17,18],[22,16],
      [5,14],[10,12],[15,14],[20,12],
      [2,10],[8,8],[13,10],[18,8],[23,10],

    ];
    pDefs.forEach(([gx,gy]) => {

    });
    lv.enemies.push({
      x: 20*TILE, y: 3*TILE, w: 48, h: 48,
      type: 'boss', vx: -1, alive: true, hp: 3, maxHp: 3, flashTimer: 0,
      shootTimer: 0, shootInterval: 90
    });
    const eDefs = [
      [5*TILE,(GRID-2)*TILE,'snake'],
      [10*TILE,(GRID-2)*TILE,'scorpion'],
      [16*TILE,(GRID-2)*TILE,'snake'],

      [13*TILE,9*TILE,'snake']
    ];
    eDefs.forEach(([ex,ey,type]) => {
      lv.enemies.push({ x: ex, y: ey, w: 28, h: 24, type, vx: type==='bat'?BAT_SPEED:-ENEMY_SPEED, vy: type==='bat'?1:0, alive: true, baseY: ey });
    });
    const bDefs = [[4*TILE,19*TILE],[11*TILE,15*TILE],[19*TILE,17*TILE],[9*TILE,11*TILE],[21*TILE,11*TILE],[13*TILE,4*TILE]];
    bDefs.forEach(([bx,by]) => {
      lv.bottles.push({ x: bx, y: by, w: 20, h: 24, collected: false });
    });
    lv.checkpoints = [
      { x: 10*TILE, y: (GRID-2)*TILE - 40, active: false },
      { x: 16*TILE, y: (GRID-2)*TILE - 40, active: false }
    ];
    lv.exit = { x: 24*TILE, y: 3*TILE, w: 32, h: 40 };
  }
}

// ==================== PLAYER ====================
let player = {
  x: 2*TILE, y: (GRID-2)*TILE - 48, w: 24, h: 48,
  vx: 0, vy: 0, hp: 5, maxHp: 5,
  onGround: false, facing: 1, specialCooldown: 0,
  ability: '', abilityDesc: '', coyoteTimer: 0
};

let lastCheckpoint = null;

function resetPlayer() {
  if (lastCheckpoint) {
    player.x = lastCheckpoint.x;
    player.y = lastCheckpoint.y;
  } else {
    player.x = 2 * TILE;
    player.y = (GRID - 2) * TILE - 48;
  }
  player.vx = 0;
  player.vy = 0;
  player.hp = player.maxHp;
  player.onGround = false;
  player.specialCooldown = 0;
  player.coyoteTimer = 0;
  invincibleTimer = 0;
  stealthTimer = 0;
  fireBalls = [];
}

function startGame(charIdx) {
  currentChar = charIdx;
  currentLevel = 0;
  score = 0;
  lives = 3;
  const ability = CHARACTER_ABILITIES[charIdx];
  player.ability = ability.effect;
  player.abilityDesc = ability.desc;
  if (ability.effect === 'extraHp') {
    player.maxHp = 6;
  } else {
    player.maxHp = 5;
  }
  buildLevel(0);
  resetPlayer();
  gameState = 'playing';
  gamePaused = false;
  particleSystem.particles = [];
  bossProjectiles = [];
  comboCounter = 0;
  comboTimer = 0;
  floatingTexts = [];
  updateUI();
}

function restartGame() {
  if (gameState === 'menu') return;
  if (gameState === 'playing') {
    resetPlayer();
    buildLevel(currentLevel);
  } else {
    gameState = 'menu';
  }
}

function handleDeath() {
  lives--;
  if (lives > 0) {
    resetPlayer();
    buildLevel(currentLevel);
  } else {
    gameState = 'gameover';
  }
  updateUI();
}

function updateUI() {
  let hpStr = '';
  for (let i = 0; i < player.maxHp; i++) {
    hpStr += i < player.hp ? '❤' : '🖤';
  }
  hpStr += '  ×' + lives;
  document.getElementById('hpDisplay').textContent = hpStr;
  document.getElementById('scoreDisplay').textContent = '分数: ' + score;
  const lvNames = ['森林冒险','翻山越岭','蛇精洞府'];
  document.getElementById('levelDisplay').textContent = '第' + (currentLevel+1) + '关: ' + lvNames[currentLevel];
  const abEl = document.getElementById('abilityDisplay');
  if (player.ability) {
    const ab = CHARACTER_ABILITIES[currentChar];
    abEl.textContent = ab.name + '·' + ab.ability;
    abEl.style.color = GOURDS[currentChar].color;
  }
}

// ==================== COLLISION ====================
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function resolveCollision(entity, plat) {
  const overlapX = Math.min(entity.x + entity.w - plat.x, plat.x + plat.w - entity.x);
  const overlapY = Math.min(entity.y + entity.h - plat.y, plat.y + plat.h - entity.y);
  if (overlapX < overlapY) {
    if (entity.x + entity.w / 2 < plat.x + plat.w / 2) {
      entity.x = plat.x - entity.w;
    } else {
      entity.x = plat.x + plat.w;
    }
    entity.vx = 0;
  } else {
    if (entity.y + entity.h / 2 < plat.y + plat.h / 2) {
      entity.y = plat.y - entity.h;
      entity.vy = 0;
      entity.onGround = true;
    } else {
      entity.y = plat.y + plat.h;
      entity.vy = 0;
    }
  }
}

// ==================== UPDATE PLAYER ====================
function updatePlayer() {
  let dx = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) { dx = -1; player.facing = -1; }
  if (keys['KeyD'] || keys['ArrowRight']) { dx = 1; player.facing = 1; }
  // S键减速/蹲下
  const speedMult = keys['KeyS'] ? 0.4 : 1;
  const baseSpeed = player.ability === 'fastMove' ? 6.25 : 5;
  player.vx = dx * baseSpeed * FRICTION * speedMult;

  const jumpForce = player.ability === 'longJump' ? JUMP_FORCE * 1.3 : JUMP_FORCE;
  if ((keys['KeyG'] || keys['KeyW'] || keys['ArrowUp'] || keys['Space']) && (player.onGround || player.coyoteTimer > 0)) {
    player.vy = jumpForce;
    player.onGround = false;
    player.coyoteTimer = 0;
    sound.jump();
  }

  if (keys['KeyK'] && !player.specialCooldown) {
    if (player.ability === 'fireBreath') {
      fireBalls.push({
        x: player.x + player.w / 2,
        y: player.y + player.h / 2 - 4,
        vx: player.facing * 8,
        vy: 0,
        life: 40
      });
      player.specialCooldown = 20;
      sound.collect();
    } else if (player.ability === 'stealth') {
      stealthTimer = 120;
      player.specialCooldown = 90;
      sound.jump();
    } else {
      player.vx = player.facing * 12;
      player.specialCooldown = 30;
      sound.hurt();
    }
  }
  if (player.specialCooldown > 0) player.specialCooldown--;
  if (stealthTimer > 0) stealthTimer--;

  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  if (Math.abs(player.vx) > 0.5) {
    animTimer++;
    if (animTimer >= 8) {
      animTimer = 0;
      animFrame = (animFrame + 1) % ANIM_WALK.length;
    }
  } else {
    animFrame = 0;
    animTimer = 0;
  }

  const lv = LEVELS[currentLevel];
  player.onGround = false;

  for (const p of lv.platforms) {
    if (aabb(player, p)) {
      resolveCollision(player, p);
    }
  }

  // Coyote time
  if (player.onGround) {
    player.coyoteTimer = 6;
  } else {
    if (player.coyoteTimer > 0) player.coyoteTimer--;
  }

  // Checkpoint detection
  for (const cp of lv.checkpoints) {
    if (!cp.active && aabb(player, { x: cp.x, y: cp.y, w: 32, h: 40 })) {
      cp.active = true;
      lastCheckpoint = { x: cp.x, y: cp.y };
      sound.checkpoint();
      particleSystem.emitCollect(cp.x + 16, cp.y + 20);
    }
  }

  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > W) { player.x = W - player.w; player.vx = 0; }
  if (player.y > H) {
    player.hp = 0;
  }
  if (player.y < 0) { player.y = 0; player.vy = 0; }

  if (invincibleTimer > 0) invincibleTimer--;

  // Boss projectiles hit player
  for (const bp of bossProjectiles) {
    if (aabb(player, { x: bp.x - 4, y: bp.y - 4, w: 8, h: 8 })) {
      if (invincibleTimer <= 0) {
        player.hp--;
        invincibleTimer = 60;
        player.vy = -6;
        bp.life = 0;
        sound.hurt();
        screenShake.shake(6, 10);
        if (player.hp <= 0) { handleDeath(); return; }
        updateUI();
      }
    }
  }

  // Enemy collision
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    if (!aabb(player, e)) continue;
    if (stealthTimer > 0) continue;

    const playerBottom = player.y + player.h;
    const enemyTop = e.y;
    const falling = player.vy > 0;

    if (falling && playerBottom - enemyTop < 20) {
      if (e.type === 'boss') {
        e.hp -= (player.ability === 'doubleDamage' ? 2 : 1);
        e.flashTimer = 10;
        e.shootTimer = 0;
        player.vy = JUMP_FORCE * 0.7;
        sound.bossHurt();
        screenShake.shake(10, 15);
        particleSystem.emitBossHit(e.x + e.w / 2, e.y + e.h / 2);
        if (e.hp <= 0) {
          e.alive = false;
          score += 500;
          particleSystem.emitVictory(e.x + e.w / 2, e.y + e.h / 2);
          screenShake.shake(15, 25);
          sound.bossDefeat();
          lv.bossDefeated = true;
        }
        score += 100;
      } else {
        e.alive = false;
        player.vy = JUMP_FORCE * 0.7;
        comboCounter++;
        comboTimer = COMBO_TIMEOUT;
        const pts = getComboScore(100);
        score += pts;
        sound.killEnemy();
        particleSystem.emitExplosion(e.x + e.w / 2, e.y + e.h / 2);
        screenShake.shake(3, 5);
        const textX = e.x + e.w / 2;
        const textY = e.y - 10;
        if (comboCounter >= 5) {
          addFloatingText(textX, textY, 'UNSTOPPABLE! + ' + pts, '#ff0');
        } else if (comboCounter >= 2) {
          addFloatingText(textX, textY, 'x' + comboCounter + ' COMBO! + ' + pts, '#ff0');
        } else {
          addFloatingText(textX, textY, '+' + pts, '#fff');
        }
      }
    } else if (invincibleTimer <= 0) {
      player.hp--;
      invincibleTimer = 60;
      player.vx = (player.x < e.x) ? -6 : 6;
      player.vy = -6;
      sound.hurt();
      screenShake.shake(5, 12);
      if (player.hp <= 0) { handleDeath(); return; }
    }
    updateUI();
  }

  // Fireball collision with enemies
  for (let fi = fireBalls.length - 1; fi >= 0; fi--) {
    const fb = fireBalls[fi];
    for (const e of lv.enemies) {
      if (!e.alive) continue;
      if (aabb({ x: fb.x - 4, y: fb.y - 4, w: 8, h: 8 }, e)) {
        if (e.type === 'boss') {
          e.hp--;
          e.flashTimer = 10;
          e.shootTimer = 0;
          sound.bossHurt();
          screenShake.shake(8, 12);
          particleSystem.emitBossHit(e.x + e.w / 2, e.y + e.h / 2);
          if (e.hp <= 0) {
            e.alive = false;
            score += 500;
            particleSystem.emitVictory(e.x + e.w / 2, e.y + e.h / 2);
            screenShake.shake(15, 25);
            sound.bossDefeat();
            lv.bossDefeated = true;
          }
        } else {
          e.alive = false;
          score += 100;
          sound.killEnemy();
          particleSystem.emitExplosion(e.x + e.w / 2, e.y + e.h / 2);
          screenShake.shake(3, 5);
        }
        fb.life = 0;
        break;
      }
    }
  }

  // Bottle collection
  const magnetRange = player.ability === 'magnet' ? 96 : 0;
  for (const b of lv.bottles) {
    if (b.collected) continue;
    if (magnetRange > 0) {
      const mdx = (player.x + player.w/2) - (b.x + b.w/2);
      const mdy = (player.y + player.h/2) - (b.y + b.h/2);
      const mDist = Math.sqrt(mdx*mdx + mdy*mdy);
      if (mDist < magnetRange) {
        b.x += mdx * 0.08;
        b.y += mdy * 0.08;
      }
    }
    if (aabb(player, b)) {
      b.collected = true;
      if (player.hp < player.maxHp) player.hp++;
      score += 50;
      sound.collect();
      particleSystem.emitCollect(b.x + b.w / 2, b.y + b.h / 2);
      updateUI();
    }
  }

  // General death check (falling off screen)
  if (player.hp <= 0 && gameState === 'playing') {
    handleDeath();
    return;
  }

  // Exit check (only if boss defeated in level 2)
  if (lv.exit && aabb(player, lv.exit)) {
    if (currentLevel === 2 && !lv.bossDefeated) {
      // Cannot exit until boss is defeated
    } else if (currentLevel < 2) {
      currentLevel++;
      if (lives < 3) lives++;
      buildLevel(currentLevel);
      resetPlayer();
      updateUI();
    } else if (currentLevel === 2 && lv.bossDefeated) {
      sound.victory();
      gameState = 'victory';
    }
  }
}

// ==================== UPDATE ENEMIES ====================
function updateEnemies() {
  const lv = LEVELS[currentLevel];
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    if (e.type === 'boss') {
      if (e.flashTimer > 0) e.flashTimer--;
      e.x += e.vx;
      if (e.x < 14*TILE || e.x + e.w > 25*TILE) e.vx *= -1;

      // Boss shooting - multi-phase
      e.shootTimer++;
      let shootInterval, pattern;
      if (e.hp >= 3) {
        shootInterval = 90;
        pattern = 'single';
      } else if (e.hp >= 2) {
        shootInterval = 60;
        pattern = 'spread';
      } else {
        shootInterval = 30;
        pattern = 'homing';
      }
      if (e.shootTimer >= shootInterval) {
        e.shootTimer = 0;
        const bx = e.x + e.w / 2;
        const by = e.y + e.h;
        if (pattern === 'single') {
          const dx = player.x - bx;
          const dy = player.y - by;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          bossProjectiles.push({ x: bx, y: by, vx: (dx / dist) * 3, vy: (dy / dist) * 3, life: 120 });
        } else if (pattern === 'spread') {
          for (let i = -1; i <= 1; i++) {
            const angle = (i * 15) * Math.PI / 180;
            const dx = player.x - bx;
            const dy = player.y - by;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const baseVx = (dx / dist) * 3;
            const baseVy = (dy / dist) * 3;
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            bossProjectiles.push({
              x: bx, y: by,
              vx: baseVx * cosA - baseVy * sinA,
              vy: baseVx * sinA + baseVy * cosA,
              life: 120
            });
          }
        } else if (pattern === 'homing') {
          const dx = player.x - bx;
          const dy = player.y - by;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          bossProjectiles.push({
            x: bx, y: by,
            vx: (dx / dist) * 4,
            vy: (dy / dist) * 4,
            life: 150,
            homing: true
          });
          // Summon a minion
          if (lv.enemies.filter(e2 => e2.alive && e2.type !== 'boss').length < 6) {
            const mType = Math.random() > 0.5 ? 'snake' : 'bat';
            lv.enemies.push({
              x: e.x + (Math.random() > 0.5 ? -TILE : e.w + TILE),
              y: (GRID - 2) * TILE,
              w: 28, h: 24, type: mType,
              vx: mType === 'bat' ? BAT_SPEED : -ENEMY_SPEED,
              vy: mType === 'bat' ? 1 : 0,
              alive: true, baseY: (GRID - 2) * TILE
            });
          }
        }
      }
      continue;
    }
    if (e.type === 'bat') {
      e.x += e.vx;
      e.y = e.baseY + Math.sin(frameCount * 0.05) * 40;
      if (e.x < 0 || e.x + e.w > W) e.vx *= -1;
    } else {
      e.x += e.vx;
      let blocked = false;
      for (const p of lv.platforms) {
        if (aabb({ x: e.x, y: e.y, w: e.w, h: e.h }, p)) {
          blocked = true;
          break;
        }
      }
      let edgeCheck = { x: (e.vx > 0 ? e.x + e.w + 2 : e.x - 2), y: e.y + e.h + 2, w: e.w, h: 4 };
      let onEdge = false;
      for (const p of lv.platforms) {
        if (aabb(edgeCheck, p)) { onEdge = true; break; }
      }
      if (!onEdge) e.vx *= -1;
      if (blocked) e.vx *= -1;

      if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
      if (e.x + e.w > W) { e.x = W - e.w; e.vx = -Math.abs(e.vx); }
    }
  }
}

// ==================== DRAWING FUNCTIONS ====================
function drawBackground() {
  const lv = LEVELS[currentLevel];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lv.bgColorTop);
  grad.addColorStop(1, lv.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (currentLevel === 0) {
    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 2000;
    ctx.fillStyle = '#1a3a0e';
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 2000) + 2000) % 2000;
      ctx.beginPath();
      ctx.moveTo(wrapped - 20, H - 100);
      ctx.lineTo(wrapped + e.w / 2, H - 100 - e.h);
      ctx.lineTo(wrapped + e.w + 20, H - 100);
      ctx.fill();
    }

    const layer1 = PARALLAX_LAYERS[1];
    const off1 = (-player.x * layer1.speed) % 1800;
    ctx.fillStyle = '#1a4a0e';
    for (const e of layer1.elements) {
      const ex = e.x + off1;
      const wrapped = ((ex % 1800) + 1800) % 1800;
      ctx.fillRect(wrapped + 8, H - 160, 8, 120);
      ctx.beginPath();
      ctx.moveTo(wrapped - 20, H - 140);
      ctx.lineTo(wrapped + 12, H - 140 - e.h);
      ctx.lineTo(wrapped + 44, H - 140);
      ctx.fill();
    }

    const layer2 = PARALLAX_LAYERS[2];
    const off2 = (-player.x * layer2.speed) % 1200;
    ctx.fillStyle = '#2a6a1a';
    for (const e of layer2.elements) {
      const ex = e.x + off2;
      const wrapped = ((ex % 1200) + 1200) % 1200;
      ctx.fillRect(wrapped, H - 60, 30, e.h);
      ctx.fillRect(wrapped + 5, H - 60 - e.h, 20, e.h);
    }
  } else if (currentLevel === 1) {
    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 2000;
    ctx.fillStyle = '#3a2a0e';
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 2000) + 2000) % 2000;
      ctx.beginPath();
      ctx.moveTo(wrapped, H - 100);
      ctx.lineTo(wrapped + 90, H - 100 - e.h);
      ctx.lineTo(wrapped + 180, H - 100);
      ctx.fill();
    }
    ctx.fillStyle = '#e8e8e8';
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 2000) + 2000) % 2000;
      ctx.beginPath();
      ctx.moveTo(wrapped + 60, H - 100 - e.h + 40);
      ctx.lineTo(wrapped + 90, H - 100 - e.h);
      ctx.lineTo(wrapped + 120, H - 100 - e.h + 40);
      ctx.fill();
    }

    const layer2 = PARALLAX_LAYERS[2];
    const off2 = (-player.x * layer2.speed) % 1200;
    ctx.fillStyle = '#5a4a2a';
    for (const e of layer2.elements) {
      const ex = e.x + off2;
      const wrapped = ((ex % 1200) + 1200) % 1200;
      ctx.fillRect(wrapped, H - 50, 20, e.h);
      ctx.fillRect(wrapped + 3, H - 50 - e.h, 14, e.h);
    }
  } else {
    const layer0 = PARALLAX_LAYERS[0];
    const off0 = (-player.x * layer0.speed) % 1800;
    ctx.fillStyle = '#0a0a1e';
    for (const e of layer0.elements) {
      const ex = e.x + off0;
      const wrapped = ((ex % 1800) + 1800) % 1800;
      ctx.beginPath();
      ctx.moveTo(wrapped, 0);
      ctx.lineTo(wrapped + 16, e.h);
      ctx.lineTo(wrapped + 32, 0);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(100,200,255,0.3)';
    for (let i = 0; i < 15; i++) {
      const gx = (i * 57 + 10) % W;
      const gy = (i * 43 + 30) % (H - 100);
      ctx.beginPath();
      ctx.arc(gx, gy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlatforms() {
  const lv = LEVELS[currentLevel];
  for (const p of lv.platforms) {
    if (p.y >= (GRID - 1) * TILE) {
      ctx.fillStyle = currentLevel === 0 ? '#4a7a2a' : currentLevel === 1 ? '#8a6a3a' : '#3a3a5a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = currentLevel === 0 ? '#5a8a3a' : currentLevel === 1 ? '#9a7a4a' : '#4a4a6a';
      ctx.fillRect(p.x, p.y, p.w, 4);
      continue;
    }
    ctx.fillStyle = currentLevel === 0 ? '#6a4a2a' : currentLevel === 1 ? '#7a5a2a' : '#4a4a6a';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = currentLevel === 0 ? '#8a6a3a' : currentLevel === 1 ? '#9a7a3a' : '#6a6a8a';
    ctx.fillRect(p.x, p.y, p.w, 4);
    if (currentLevel === 0) {
      ctx.fillStyle = '#5aaa3a';
      ctx.fillRect(p.x, p.y - 3, p.w, 6);
    }
  }
}

function drawPlayer() {
  const g = GOURDS[currentChar];
  const px = Math.round(player.x);
  const py = Math.round(player.y);

  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2 === 0) return;
  if (stealthTimer > 0) {
    ctx.globalAlpha = 0.3;
  }

  ctx.save();
  if (player.facing < 0) {
    ctx.translate(px + player.w / 2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(px + player.w / 2), 0);
  }

  const scale = 2;
  const spriteX = px - 12;
  const spriteY = py - 8;

  const currentSprite = !player.onGround ? ANIM_JUMP[0] : ANIM_WALK[animFrame];

  const tempColors = { ...PIXEL_COLORS };
  tempColors['R'] = g.color;
  tempColors['r'] = g.dark;
  
  currentSprite.forEach((row, rowIndex) => {
    row.split('').forEach((pixel, colIndex) => {
      if (pixel !== '_' && tempColors[pixel]) {
        ctx.fillStyle = tempColors[pixel];
        ctx.fillRect(spriteX + colIndex * scale, spriteY + rowIndex * scale, scale, scale);
      }
    });
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

function updateFireBalls() {
  fireBalls = fireBalls.filter(fb => {
    fb.x += fb.vx;
    fb.y += fb.vy;
    fb.life--;
    return fb.life > 0 && fb.x > 0 && fb.x < W;
  });
}

function drawFireBalls() {
  for (const fb of fireBalls) {
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemies() {
  const lv = LEVELS[currentLevel];
  for (const e of lv.enemies) {
    if (!e.alive) continue;
    const ex = Math.round(e.x), ey = Math.round(e.y);

    if (e.type === 'snake') {
      const scale = 2;
      const sx = ex - 2;
      const sy = ey - 2;
      drawPixelArt(ctx, sx, sy, SPRITE_SNAKE, scale);
    } else if (e.type === 'scorpion') {
      const scale = 2;
      const sx = ex - 1;
      const sy = ey;
      drawPixelArt(ctx, sx, sy, SPRITE_SCORPION, scale);
    } else if (e.type === 'bat') {
      const scale = 2;
      const sx = ex - 2;
      const sy = ey;
      drawPixelArt(ctx, sx, sy, SPRITE_BAT, scale);
    } else if (e.type === 'boss') {
      if (e.flashTimer > 0) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex, ey, e.w, e.h);
        ctx.globalAlpha = 1;
      } else {
        const scale = 3;
        const sx = ex - 12;
        const sy = ey - 6;
        drawPixelArt(ctx, sx, sy, SPRITE_BOSS, scale);
      }
      // HP bar
      const barW = e.w;
      const barH = 8;
      const barX = ex;
      const barY = ey - 18;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = e.hp > 1 ? '#f00' : '#ff0';
      ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
      // HP text
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.hp + '/' + e.maxHp, barX + barW / 2, barY - 3);
    }
  }
}

function drawBottles() {
  const lv = LEVELS[currentLevel];
  for (const b of lv.bottles) {
    if (b.collected) continue;
    const bx = Math.round(b.x), by = Math.round(b.y);
    const bob = Math.sin(frameCount * 0.05 + bx) * 3;
    const scale = 2;
    drawPixelArt(ctx, bx - 2, by + bob - 2, SPRITE_BOTTLE, scale);
    // Glow
    ctx.fillStyle = 'rgba(100,255,100,0.3)';
    ctx.beginPath();
    ctx.arc(bx + 8, by + 10 + bob, 14, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCheckpoints() {
  const lv = LEVELS[currentLevel];
  for (const cp of lv.checkpoints) {
    const cx = cp.x, cy = cp.y;
    if (cp.active) {
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(cx + 14, cy, 4, 40);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(cx + 18, cy, 16, 12);
      const glow = Math.sin(frameCount * 0.1) * 0.2 + 0.5;
      ctx.fillStyle = `rgba(255,215,0,${glow})`;
      ctx.beginPath();
      ctx.arc(cx + 16, cy + 20, 20, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(cx + 14, cy, 4, 40);
      ctx.fillStyle = '#666';
      ctx.fillRect(cx + 18, cy, 16, 12);
    }
  }
}

function drawExit() {
  const lv = LEVELS[currentLevel];
  if (!lv.exit) return;
  const ex = lv.exit;
  const canExit = currentLevel < 2 || lv.bossDefeated;
  const glow = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
  if (canExit) {
    ctx.fillStyle = `rgba(100,200,255,${glow})`;
    ctx.fillRect(ex.x + 2, ex.y + 4, ex.w - 4, ex.h - 4);
    ctx.fillStyle = '#0af';
  } else {
    ctx.fillStyle = `rgba(150,50,50,${glow})`;
    ctx.fillRect(ex.x + 2, ex.y + 4, ex.w - 4, ex.h - 4);
    ctx.fillStyle = '#a33';
  }
  ctx.fillRect(ex.x, ex.y, ex.w, ex.h);
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(canExit ? '▶' : '🔒', ex.x + ex.w / 2, ex.y + ex.h / 2 + 5);
}

function drawMenu() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('葫 芦 娃 闯 关', W / 2, 80);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px monospace';
  ctx.fillText('选择你的葫芦娃开始冒险', W / 2, 120);

  ctx.fillStyle = '#ff6666';
  ctx.font = '16px monospace';
  ctx.fillText('当前生命数: ×' + lives, W / 2, 150);

  const startX = 60;
  const spacing = 105;
  for (let i = 0; i < 7; i++) {
    const x = startX + i * spacing;
    const y = 190;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(x - 5, y - 5, 90, 200);

    const menuScale = 5;
    const tempColors = { ...PIXEL_COLORS };
    tempColors['R'] = GOURDS[i].color;
    tempColors['r'] = GOURDS[i].dark;
    SPRITE_GOURD.forEach((row, rowIndex) => {
      row.split('').forEach((pixel, colIndex) => {
        if (pixel !== '_' && tempColors[pixel]) {
          ctx.fillStyle = tempColors[pixel];
          ctx.fillRect(x + 5 + colIndex * menuScale, y + 5 + rowIndex * menuScale, menuScale, menuScale);
        }
      });
    });

    ctx.fillStyle = GOURDS[i].color;
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(GOURDS[i].name, x + 40, y + 90);

    ctx.fillStyle = '#ffd700';
    ctx.font = '11px monospace';
    ctx.fillText(CHARACTER_ABILITIES[i].ability, x + 40, y + 108);

    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    const desc = CHARACTER_ABILITIES[i].desc;
    if (desc.length > 8) {
      ctx.fillText(desc.substring(0, 8), x + 40, y + 124);
      ctx.fillText(desc.substring(8), x + 40, y + 138);
    } else {
      ctx.fillText(desc, x + 40, y + 124);
    }

    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    ctx.fillText('按 ' + (i + 1), x + 40, y + 165);
  }

  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WASD移动 | G跳跃 | 数字键1-7选择角色', W / 2, 480);
  ctx.fillText('从上方踩踏敌人消灭它们 | K使用特殊能力', W / 2, 510);
  ctx.fillText('收集葫芦瓶恢复生命 | 到达出口过关', W / 2, 540);
  ctx.fillText('ESC暂停 | M静音 | F1调试模式', W / 2, 570);

  ctx.fillStyle = '#444';
  ctx.font = '12px monospace';
  ctx.fillText('纯HTML5 Canvas游戏 | 无外部依赖', W / 2, H - 30);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 56px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', W / 2, H / 2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px monospace';
  ctx.fillText('按 R 重新开始', W / 2, H / 2 + 70);
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 5; i++) {
    const fx = W / 2 + Math.sin(frameCount * 0.03 + i * 1.3) * 200;
    const fy = 100 + Math.cos(frameCount * 0.02 + i) * 80;
    const colors = ['#f00', '#ff0', '#0f0', '#0ff', '#f0f'];
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.arc(fx, fy, 8 + Math.sin(frameCount * 0.1 + i) * 4, 0, Math.PI * 2);
    ctx.fill();
    for (let j = 0; j < 8; j++) {
      const angle = (j / 8) * Math.PI * 2 + frameCount * 0.02;
      const len = 15 + Math.sin(frameCount * 0.1 + j) * 8;
      ctx.strokeStyle = colors[(i + j) % 5];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + Math.cos(angle) * len, fy + Math.sin(angle) * len);
      ctx.stroke();
    }
  }

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 56px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('恭喜通关！', W / 2, H / 2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);

  ctx.fillStyle = '#0f0';
  ctx.font = '20px monospace';
  ctx.fillText('葫芦娃们成功打败了蛇精！', W / 2, H / 2 + 60);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px monospace';
  ctx.fillText('按 R 返回菜单', W / 2, H / 2 + 110);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('游戏暂停', W / 2, H / 2 - 60);

  ctx.font = '24px monospace';
  ctx.fillText('按 ESC 继续游戏', W / 2, H / 2 + 10);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px monospace';
  ctx.fillText('按 M ' + (gameMuted ? '取消静音' : '静音'), W / 2, H / 2 + 60);
  ctx.fillText('按 R 返回菜单', W / 2, H / 2 + 90);

  // Show mute status
  ctx.fillStyle = gameMuted ? '#f44' : '#4f4';
  ctx.font = '16px monospace';
  ctx.fillText(gameMuted ? '🔊 静音中' : '🔊 声音开启', W / 2, H / 2 + 130);
}

function drawHUD() {
  const g = GOURDS[currentChar];
  ctx.fillStyle = g.color;
  ctx.fillRect(10, 10, 24, 24);
  ctx.fillStyle = '#fff';
  ctx.fillRect(14, 16, 4, 4);
  ctx.fillRect(22, 16, 4, 4);

  if (player.ability) {
    const ab = CHARACTER_ABILITIES[currentChar];
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(ab.name + '·' + ab.ability, 40, 28);
  }

  if (comboCounter >= 2) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'right';
    const comboText = comboCounter >= 5 ? 'UNSTOPPABLE x' + comboCounter : 'x' + comboCounter + ' COMBO';
    ctx.fillText(comboText, W - 10, 28);
    ctx.fillStyle = 'rgba(255,255,0,0.3)';
    const barW = Math.min(comboTimer / COMBO_TIMEOUT, 1) * 120;
    ctx.fillRect(W - 130, 32, barW, 4);
  }

  // Stealth indicator
  if (stealthTimer > 0) {
    ctx.fillStyle = 'rgba(100,200,255,0.8)';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('隐身中 ' + Math.ceil(stealthTimer / 60) + 's', W / 2, H - 20);
  }

  // Boss HP bar in HUD (level 3)
  if (currentLevel === 2) {
    const lv = LEVELS[2];
    const boss = lv.enemies.find(e => e.type === 'boss' && e.alive);
    if (boss) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W / 2 - 100, 10, 200, 12);
      ctx.fillStyle = '#f00';
      ctx.fillRect(W / 2 - 100, 10, 200 * (boss.hp / boss.maxHp), 12);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(W / 2 - 100, 10, 200, 12);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('蛇精 ' + boss.hp + '/' + boss.maxHp, W / 2, 20);
    }
  }
}

// ==================== MAIN GAME LOOP ====================
function gameLoop(timestamp) {
  frameCount++;

  // FPS calculation
  const delta = timestamp - lastFrameTime;
  lastFrameTime = timestamp;
  fpsTimer += delta;
  fpsCount++;
  if (fpsTimer >= 1000) {
    fps = fpsCount;
    fpsCount = 0;
    fpsTimer = 0;
  }

  ctx.clearRect(0, 0, W, H);

  if (gameState === 'menu') {
    drawMenu();
  } else if (gameState === 'playing') {
    if (!gamePaused) {
      updatePlayer();
      updateEnemies();
      updateBossProjectiles();
      updateFireBalls();
      particleSystem.update();
      screenShake.update();
      updateFloatingTexts();
      if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboCounter = 0;
      }
    }

    screenShake.apply(ctx);
    drawBackground();
    drawPlatforms();
    drawCheckpoints();
    drawBottles();
    drawExit();
    drawBossProjectiles();
    drawFireBalls();
    drawEnemies();
    drawPlayer();
    drawFloatingTexts();
    particleSystem.draw(ctx);
    screenShake.restore(ctx);
    drawHUD();

    if (gamePaused) {
      drawPauseOverlay();
    }

    // Debug mode
    if (debugMode) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(10, H - 60, 200, 50);
      ctx.fillStyle = '#0f0';
      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('FPS: ' + fps, 16, H - 42);
      ctx.fillText('粒子: ' + particleSystem.particles.length, 16, H - 26);
      ctx.fillText('关卡: ' + (currentLevel + 1) + ' | 暂停: ' + gamePaused, 16, H - 10);
    }
  } else if (gameState === 'gameover') {
    drawBackground();
    drawPlatforms();
    drawGameOver();
  } else if (gameState === 'victory') {
    particleSystem.update();
    drawVictory();
    particleSystem.draw(ctx);
  }

  requestAnimationFrame(gameLoop);
}

// ==================== INPUT HANDLING ====================
document.addEventListener('keydown', (e) => {
  // Initialize audio on first interaction
  sound.init();

  keys[e.code] = true;

  // ESC - Pause/Resume
  if (e.code === 'Escape') {
    if (gameState === 'playing') {
      gamePaused = !gamePaused;
    }
  }

  // M - Mute/Unmute
  if (e.code === 'KeyM') {
    sound.toggle();
  }

  // F1 - Debug mode
  if (e.code === 'F1') {
    e.preventDefault();
    debugMode = !debugMode;
  }

  // R - Restart
  if (e.code === 'KeyR') {
    if (gameState === 'gameover' || gameState === 'victory') {
      gameState = 'menu';
      score = 0;
      comboCounter = 0;
      comboTimer = 0;
      floatingTexts = [];
      particleSystem.particles = [];
    } else if (gameState === 'playing') {
      resetPlayer();
      buildLevel(currentLevel);
      score = 0;
      comboCounter = 0;
      comboTimer = 0;
      floatingTexts = [];
      updateUI();
    }
  }

  // Character selection (menu only)
  if (gameState === 'menu') {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 7) {
      startGame(num - 1);
    }
  }

  // Prevent scrolling
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ==================== START ====================
updateUI();
gameLoop(performance.now());
</script>
</body>
