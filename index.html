<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>葫芦兄弟：拯救爷爷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Sans SC', sans-serif;
  color: #eee;
}
#game {
  width: 1000px;
  min-height: 700px;
  background: #1a1a2e;
  border-radius: 16px;
  border: 3px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,0.3);
  overflow: hidden;
}
#top-bar {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: rgba(0,0,0,0.3);
  border-bottom: 2px solid #333;
}
#chapter {
  font-size: 16px;
  color: #ffd700;
  font-weight: bold;
}
#turn {
  font-size: 14px;
  color: #888;
}
#main-area {
  display: flex;
  height: 400px;
}
#left-panel {
  flex: 1;
  padding: 15px;
  border-right: 2px solid #333;
}
#right-panel {
  flex: 1;
  padding: 15px;
}
.panel-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 2px solid;
}
.player-title { color: #4ecdc4; border-color: #4ecdc4; }
.boss-title { color: #ff6b6b; border-color: #ff6b6b; }
.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
  font-size: 14px;
}
.stat-bar {
  width: 120px;
  height: 16px;
  background: #333;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.stat-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s;
}
.hp-fill { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
.power-fill { background: linear-gradient(90deg, #ffd700, #ffed4a); }
.brave-fill { background: linear-gradient(90deg, #4ecdc4, #7ee8e0); }
.karma-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
.stat-name { width: 60px; }
.stat-num { width: 40px; text-align: right; }
#skills {
  margin-top: 15px;
}
.skill-tag {
  display: inline-block;
  padding: 4px 8px;
  margin: 3px;
  border-radius: 12px;
  font-size: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid #666;
}
.skill-active {
  background: rgba(78,205,196,0.3);
  border-color: #4ecdc4;
  color: #4ecdc4;
}
#narrative {
  padding: 15px 20px;
  min-height: 150px;
  background: rgba(0,0,0,0.3);
}
#speaker {
  font-size: 16px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 8px;
}
#text {
  font-size: 15px;
  line-height: 1.8;
  color: #ddd;
  min-height: 50px;
}
#choices {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.choice-btn {
  padding: 10px 16px;
  background: linear-gradient(135deg, #3a3a5a, #2a2a4a);
  border: 2px solid #555;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}
.choice-btn:hover {
  background: linear-gradient(135deg, #5a5a8a, #4a4a7a);
  border-color: #ffd700;
  transform: translateY(-2px);
}
#actions {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  border-top: 2px solid #333;
}
.action-btn {
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  border: 2px solid;
  transition: all 0.3s;
}
.btn-fight {
  background: linear-gradient(135deg, #ff6b6b, #cc4444);
  border-color: #ff8888;
  color: #fff;
}
.btn-fight:hover { transform: scale(1.05); }
.btn-explore {
  background: linear-gradient(135deg, #4ecdc4, #2a9d8f);
  border-color: #6ee8e0;
  color: #fff;
}
.btn-explore:hover { transform: scale(1.05); }
.btn-rest {
  background: linear-gradient(135deg, #ffd700, #cc9900);
  border-color: #ffed4a;
  color: #333;
}
.btn-rest:hover { transform: scale(1.05); }
.btn-disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#start-screen {
  padding: 40px;
  text-align: center;
}
#start-screen h1 {
  font-size: 36px;
  color: #ffd700;
  margin-bottom: 20px;
}
#start-screen p {
  color: #aaa;
  margin-bottom: 30px;
}
.char-select {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}
.char-card {
  width: 100px;
  padding: 15px 10px;
  background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
  border: 2px solid #555;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}
.char-card:hover {
  border-color: #ffd700;
  transform: translateY(-5px);
}
.char-name {
  font-size: 14px;
  font-weight: bold;
  margin-top: 8px;
}
.char-skill {
  font-size: 11px;
  color: #888;
  margin-top: 4px;
}
</style>
</head>
<body>
<div id="game">
  <div id="start-screen">
    <h1>🎮 葫芦兄弟：拯救爷爷</h1>
    <p>选择你的葫芦娃，踏上拯救爷爷的冒险之旅！</p>
    <p style="color:#ffd700; font-size:14px;">💡 提示：收集兄弟、提升实力，选择合适时机挑战蛇精</p>
    <div class="char-select" id="charSelect"></div>
  </div>
  <div id="game-screen" style="display:none;">
    <div id="top-bar">
      <div id="chapter">序章</div>
      <div id="turn">回合 1</div>
    </div>
    <div id="main-area">
      <div id="left-panel">
        <div class="panel-title player-title">🧑 我方</div>
        <div id="playerStats"></div>
        <div id="skills"></div>
      </div>
      <div id="right-panel">
        <div class="panel-title boss-title">🐍 蛇精</div>
        <div id="bossStats"></div>
        <div style="margin-top:15px; padding:10px; background:rgba(255,107,107,0.1); border-radius:8px;">
          <div style="color:#ff6b6b; font-size:12px;">⚠️ 蛇精实力分析</div>
          <div id="bossAnalysis" style="color:#aaa; font-size:12px; margin-top:5px;"></div>
        </div>
      </div>
    </div>
    <div id="narrative">
      <div id="speaker">旁白</div>
      <div id="text"></div>
      <div id="choices"></div>
    </div>
    <div id="actions">
      <button class="action-btn btn-explore" id="btnExplore" onclick="doAction('explore')">🔍 探索</button>
      <button class="action-btn btn-rest" id="btnRest" onclick="doAction('rest')">💤 休息</button>
      <button class="action-btn btn-fight" id="btnFight" onclick="doAction('fight')">⚔️ 挑战蛇精</button>
    </div>
  </div>
</div>

<script>
const characters = [
  { id: 0, name: '大娃', color: '#ff0000', skill: '力大无穷', desc: '双倍伤害', icon: '🔴' },
  { id: 1, name: '二娃', color: '#ff8c00', skill: '千里眼', desc: '预判敌人', icon: '🟠' },
  { id: 2, name: '三娃', color: '#ffd700', skill: '铜头铁臂', desc: '减伤30%', icon: '🟡' },
  { id: 3, name: '四娃', color: '#00cc00', skill: '喷火', desc: '持续伤害', icon: '🟢' },
  { id: 4, name: '五娃', color: '#00cccc', skill: '吸水', desc: '回复生命', icon: '🔵' },
  { id: 5, name: '六娃', color: '#0066ff', skill: '隐身', desc: '闪避攻击', icon: '🔷' },
  { id: 6, name: '七娃', color: '#9933ff', skill: '宝葫芦', desc: '吸收伤害', icon: '🟣' }
];

let player = null;
let boss = null;
let turn = 1;
let phase = 'start';
let textIndex = 0, displayedText = '', isTyping = false;

function initGame(charId) {
  player = {
    char: characters[charId],
    hp: 100, maxHp: 100,
    power: 15, maxPower: 50,
    brave: 30, maxBrave: 100,
    karma: 0,
    allies: [characters[charId].skill],
    skills: [characters[charId].skill],
    level: 1
  };
  
  boss = {
    hp: 150, maxHp: 150,
    power: 20,
    brave: 80,
    karma: -50,
    phase: 1,
    defeated: false
  };
  
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  
  updateUI();
  showEvent('intro');
}

function updateUI() {
  document.getElementById('turn').textContent = '回合 ' + turn;
  
  document.getElementById('playerStats').innerHTML = `
    <div class="stat-row">
      <span class="stat-name">生命</span>
      <div class="stat-bar"><div class="stat-fill hp-fill" style="width:${player.hp/player.maxHp*100}%"></div></div>
      <span class="stat-num">${player.hp}/${player.maxHp}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">战力</span>
      <div class="stat-bar"><div class="stat-fill power-fill" style="width:${player.power/player.maxPower*100}%"></div></div>
      <span class="stat-num">${player.power}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">勇气</span>
      <div class="stat-bar"><div class="stat-fill brave-fill" style="width:${player.brave}%"></div></div>
      <span class="stat-num">${player.brave}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">善恶</span>
      <div class="stat-bar"><div class="stat-fill karma-fill" style="width:${Math.min(100,Math.max(0,50+player.karma))}%"></div></div>
      <span class="stat-num">${player.karma > 0 ? '+' : ''}${player.karma}</span>
    </div>
  `;
  
  document.getElementById('bossStats').innerHTML = `
    <div class="stat-row">
      <span class="stat-name">生命</span>
      <div class="stat-bar"><div class="stat-fill hp-fill" style="width:${boss.hp/boss.maxHp*100}%"></div></div>
      <span class="stat-num">${boss.hp}/${boss.maxHp}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">战力</span>
      <div class="stat-bar"><div class="stat-fill power-fill" style="width:${boss.power/40*100}%"></div></div>
      <span class="stat-num">${boss.power}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">气势</span>
      <div class="stat-bar"><div class="stat-fill brave-fill" style="width:${boss.brave}%"></div></div>
      <span class="stat-num">${boss.brave}</span>
    </div>
  `;
  
  const analysis = document.getElementById('bossAnalysis');
  if (player.power >= boss.power && player.hp >= 80) {
    analysis.textContent = '✅ 实力相当，可以一战！';
    analysis.style.color = '#4ecdc4';
  } else if (player.power >= boss.power * 0.8) {
    analysis.textContent = '⚠️ 有风险，建议再提升实力';
    analysis.style.color = '#ffd700';
  } else {
    analysis.textContent = '❌ 实力差距太大，建议继续修炼';
    analysis.style.color = '#ff6b6b';
  }
  
  let skillsHtml = '<div style="margin-top:10px;">';
  skillsHtml += '<div style="color:#888; font-size:12px; margin-bottom:5px;">已获得技能：</div>';
  player.skills.forEach(skill => {
    skillsHtml += `<span class="skill-tag skill-active">${skill}</span>`;
  });
  const allSkills = ['力大无穷', '千里眼', '铜头铁臂', '喷火', '吸水', '隐身', '宝葫芦'];
  allSkills.forEach(skill => {
    if (!player.skills.includes(skill)) {
      skillsHtml += `<span class="skill-tag">???</span>`;
    }
  });
  skillsHtml += '</div>';
  document.getElementById('skills').innerHTML = skillsHtml;
}

function typeText(text, callback) {
  displayedText = '';
  textIndex = 0;
  isTyping = true;
  document.getElementById('text').textContent = '';
  
  const typeInterval = setInterval(() => {
    if (textIndex < text.length) {
      displayedText += text[textIndex];
      textIndex++;
      document.getElementById('text').textContent = displayedText;
    } else {
      clearInterval(typeInterval);
      isTyping = false;
      if (callback) callback();
    }
  }, 25);
}

function showText(speaker, text, choices) {
  document.getElementById('speaker').textContent = speaker;
  document.getElementById('choices').innerHTML = '';
  typeText(text, () => {
    if (choices) {
      const choicesDiv = document.getElementById('choices');
      choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => {
          if (choice.effect) applyEffect(choice.effect);
          if (choice.next) showEvent(choice.next);
          updateUI();
        };
        choicesDiv.appendChild(btn);
      });
    }
  });
}

function applyEffect(effect) {
  if (effect.hp) player.hp = Math.max(0, Math.min(player.maxHp, player.hp + effect.hp));
  if (effect.power) player.power = Math.max(0, Math.min(player.maxPower, player.power + effect.power));
  if (effect.brave) player.brave = Math.max(0, Math.min(player.maxBrave, player.brave + effect.brave));
  if (effect.karma) player.karma += effect.karma;
  if (effect.skill && !player.skills.includes(effect.skill)) {
    player.skills.push(effect.skill);
  }
  if (effect.bossHp) boss.hp = Math.max(0, boss.hp + effect.bossHp);
  if (effect.bossPower) boss.power = Math.max(0, boss.power + effect.bossPower);
  if (effect.bossBrave) boss.brave = Math.max(0, boss.brave + effect.bossBrave);
  updateUI();
}

const events = {
  intro: () => {
    showText('旁白', `你选择了${player.char.name}！\n\n蛇精抓走了爷爷，你必须找到其他兄弟，集合力量去拯救他。\n\n每回合你可以：探索、休息、或挑战蛇精。`, [
      { text: '🔍 开始探索', next: 'explore_1' }
    ]);
  },
  
  explore_1: () => {
    const r = Math.random();
    if (r < 0.3) {
      showText('旁白', '你发现了一个神秘的山洞，里面似乎有东西...', [
        { text: '进入山洞', next: 'cave_find', effect: { brave: 5 } },
        { text: '绕过去', next: 'random_event' }
      ]);
    } else if (r < 0.6) {
      showText('🐍 蛇精巡逻兵', '站住！你是葫芦娃？', [
        { text: '⚔️ 战斗！', next: 'fight_patrol', effect: { brave: 10 } },
        { text: '💨 逃跑', next: 'escape_patrol', effect: { brave: -5 } }
      ]);
    } else {
      showText('旁白', '你发现了一些补给品...', [
        { text: '拾取', next: 'loot', effect: { hp: 15, power: 3 } }
      ]);
    }
  },
  
  cave_find: () => {
    const allies = ['二娃', '三娃', '四娃', '五娃', '六娃', '七娃'];
    const skillMap = { '二娃': '千里眼', '三娃': '铜头铁臂', '四娃': '喷火', '五娃': '吸水', '六娃': '隐身', '七娃': '宝葫芦' };
    const found = allies.find(a => !player.skills.includes(skillMap[a]));
    
    if (found) {
      showText(found, `终于找到你了！我是${found}！听说爷爷被抓了，我和你一起去！`, [
        { text: '太好了！', next: 'join_' + found, effect: { skill: skillMap(found), power: 10 } }
      ]);
    } else {
      showText('旁白', '山洞里只有一些金币...', [
        { text: '拿走金币', next: 'random_event', effect: { power: 5 } }
      ]);
    }
  },
  
  join_二娃: () => { showText('🔥 二娃', '我有千里眼，可以看穿敌人的弱点！', [{ text: '继续探索', next: 'random_event' }]); },
  join_三娃: () => { showText('🛡️ 三娃', '我有铜头铁臂，可以挡住敌人的攻击！', [{ text: '继续探索', next: 'random_event' }]); },
  join_四娃: () => { showText('🔥 四娃', '我的火焰可以烧伤敌人！', [{ text: '继续探索', next: 'random_event' }]); },
  join_五娃: () => { showText('💧 五娃', '我可以用水治疗你的伤口！', [{ text: '继续探索', next: 'random_event' }]); },
  join_六娃: () => { showText('💨 六娃', '我可以隐身，偷偷接近敌人！', [{ text: '继续探索', next: 'random_event' }]); },
  join_七娃: () => { showText('🟣 七娃', '我的宝葫芦可以吸收敌人的攻击！', [{ text: '继续探索', next: 'random_event' }]); },
  
  fight_patrol: () => {
    const dmg = Math.floor(player.power * 0.5);
    const enemyDmg = Math.floor(15 * (1 - player.skills.length * 0.05));
    applyEffect({ hp: -enemyDmg, power: 2, bossHp: 0 });
    showText('战斗结果', `你击退了敌人！造成 ${dmg} 伤害，但你也受伤了。`, [
      { text: '继续', next: 'random_event' }
    ]);
  },
  
  escape_patrol: () => {
    showText('旁白', '你成功逃跑了，但消耗了一些体力...', [
      { text: '继续', next: 'random_event', effect: { hp: -5 } }
    ]);
  },
  
  loot: () => {
    showText('旁白', '你获得了一些补给！', [
      { text: '太好了！', next: 'random_event' }
    ]);
  },
  
  random_event: () => {
    turn++;
    if (turn > 15 && player.power >= boss.power * 0.9) {
      showText('旁白', '你感觉时机差不多了，可以去挑战蛇精了！', [
        { text: '⚔️ 前往蛇精洞府', next: 'boss_entrance' },
        { text: '再探索一下', next: 'explore_1' }
      ]);
    } else {
      showText('旁白', `回合 ${turn}，继续你的冒险...`, [
        { text: '🔍 探索', next: 'explore_1' },
        { text: '💤 休息回复', next: 'rest_event', effect: { hp: 20 } }
      ]);
    }
  },
  
  rest_event: () => {
    showText('旁白', '你找了个安全的地方休息，恢复了一些体力。', [
      { text: '继续', next: 'random_event' }
    ]);
  },
  
  boss_entrance: () => {
    document.getElementById('chapter').textContent = '终章：蛇精洞府';
    showText('🐍 蛇精', '哈哈哈！葫芦娃，你终于来了！不过...你准备好了吗？\n\n我现在有 '+boss.hp+' 点生命，'+boss.power+' 点战力！', [
      { text: '⚔️ 决战！', next: 'boss_fight' },
      { text: '😰 再准备一下', next: 'random_event', effect: { hp: 30, power: 5 } }
    ]);
  },
  
  boss_fight: () => {
    const playerDmg = Math.floor(player.power * (1 + player.skills.length * 0.1));
    const bossDmg = Math.floor(boss.power * (1 - player.skills.length * 0.05));
    
    applyEffect({ hp: -bossDmg, bossHp: -playerDmg });
    
    if (boss.hp <= 0) {
      boss.defeated = true;
      showText('🎉 胜利！', `你成功击败了蛇精！\n\n造成 ${playerDmg} 伤害，受到 ${bossDmg} 伤害。\n\n爷爷被救出来了！`, [
        { text: '🏆 游戏结束', next: 'ending_win' }
      ]);
    } else if (player.hp <= 0) {
      showText('💀 失败', `你被蛇精打败了...\n\n蛇精还剩 ${boss.hp} 点生命。\n\n下次要更充分地准备！`, [
        { text: '🔄 重新开始', next: 'restart' }
      ]);
    } else {
      showText('⚔️ 战斗继续', `造成 ${playerDmg} 伤害，受到 ${bossDmg} 伤害。\n\n蛇精还剩 ${boss.hp} 点生命！`, [
        { text: '继续战斗', next: 'boss_fight' },
        { text: '暂时撤退', next: 'retreat' }
      ]);
    }
  },
  
  retreat: () => {
    showText('旁白', '你暂时撤退了，需要恢复一下...', [
      { text: '休息', next: 'random_event', effect: { hp: 40, power: 5 } }
    ]);
  },
  
  ending_win: () => {
    document.getElementById('chapter').textContent = '🌟 完美结局';
    showText('爷爷', '好孩子！你做到了！爷爷为你骄傲！\n\n你的善良和勇气打动了蛇精，她同意和解。\n\n从此，葫芦山恢复了和平...', [
      { text: '🔄 再玩一次', next: 'restart' }
    ]);
  },
  
  restart: () => {
    location.reload();
  }
};

function showEvent(eventId) {
  if (events[eventId]) events[eventId]();
}

function doAction(action) {
  if (action === 'explore') {
    showEvent('explore_1');
  } else if (action === 'rest') {
    applyEffect({ hp: 25, power: 3 });
    showText('旁白', '你休息了一会儿，恢复了体力。', [
      { text: '继续', next: 'random_event' }
    ]);
  } else if (action === 'fight') {
    if (player.power >= boss.power * 0.9) {
      showEvent('boss_entrance');
    } else {
      showText('旁白', '你感觉现在还不是时候...蛇精太强了。', [
        { text: '继续修炼', next: 'explore_1' }
      ]);
    }
  }
}

// 初始化角色选择
const charSelectDiv = document.getElementById('charSelect');
characters.forEach(char => {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.style.borderColor = char.color;
  card.innerHTML = `
    <div style="font-size:32px;">${char.icon}</div>
    <div class="char-name" style="color:${char.color}">${char.name}</div>
    <div class="char-skill">${char.skill}</div>
  `;
  card.onclick = () => initGame(char.id);
  charSelectDiv.appendChild(card);
});
</script>
</body>
